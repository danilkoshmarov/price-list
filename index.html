<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прайс-лист</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        h1 {
            color: white;
            text-align: center;
            font-size: 50px;
        }
        .btn {
            display: block;
            margin: 20px auto;
            padding: 15px 30px;
            font-size: 20px;
            background: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🚀 Прайс-лист</h1>
    <button class="btn" onclick="alert('Кнопка работает!')">🔑 Войти как админ</button>
</body>
</html>
