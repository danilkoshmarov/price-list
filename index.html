<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прайс-лист | ТГК</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to { opacity: 0; transform: scale(0.8); }
        }
        @keyframes searchFocus {
            0% { box-shadow: 0 0 0 rgba(233,30,99,0); }
            100% { box-shadow: 0 0 20px rgba(233,30,99,0.2); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px rgba(255,152,0,0.3); }
            50% { box-shadow: 0 0 15px rgba(255,152,0,0.6); }
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffd1dc 0%, #f8e8ff 30%, #ffe4e1 60%, #fff0f5 100%);
            min-height: 100vh; padding: 20px;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { 
            font-size: 3rem; margin-bottom: 5px; 
            background: linear-gradient(135deg, #e91e63, #9c27b0, #e91e63);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 200% auto; animation: shimmer 3s linear infinite;
        }
        .header p { font-size: 1.1rem; color: #9c27b0; opacity: 0.8; }

        .search-container { display: flex; justify-content: center; margin-bottom: 20px; }
        .search-wrapper { position: relative; width: 100%; max-width: 450px; }
        .search-input {
            width: 100%; padding: 14px 50px 14px 20px; border-radius: 50px;
            border: 2px solid rgba(233,30,99,0.2); font-size: 1rem;
            background: rgba(255,255,255,0.5); backdrop-filter: blur(10px);
            color: #5c2d91; outline: none; transition: all 0.3s ease; font-family: inherit;
        }
        .search-input::placeholder { color: #b39ddb; }
        .search-input:focus { border-color: #e91e63; background: rgba(255,255,255,0.8); animation: searchFocus 0.5s ease; }
        .search-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 1.3rem; pointer-events: none; }
        .search-clear {
            position: absolute; right: 45px; top: 50%; transform: translateY(-50%);
            font-size: 1rem; cursor: pointer; background: none; border: none;
            color: #b39ddb; display: none; transition: all 0.3s ease;
        }
        .search-clear.show { display: block; }
        .search-clear:hover { color: #e91e63; }

        .categories-nav { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 25px; padding: 5px; }
        .cat-tab {
            padding: 10px 22px; border-radius: 50px; cursor: pointer;
            font-weight: 600; font-size: 0.9rem; transition: all 0.3s ease;
            background: rgba(255,255,255,0.4); color: #9c27b0;
            border: 2px solid transparent; white-space: nowrap; backdrop-filter: blur(5px);
        }
        .cat-tab:hover { background: rgba(255,255,255,0.6); transform: translateY(-2px); }
        .cat-tab.active { background: white; color: #e91e63; border-color: #e91e63; box-shadow: 0 4px 15px rgba(233,30,99,0.2); }
        .cat-tab .count { font-size: 0.7rem; background: #e91e63; color: white; padding: 2px 8px; border-radius: 20px; margin-left: 6px; }
        
        .stats-panel { display: none; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; justify-content: center; }
        .admin-mode .stats-panel { display: flex; }
        .stat-card {
            background: rgba(255,255,255,0.25); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 18px 22px; color: #5c2d91; text-align: center;
            min-width: 140px; flex: 1; border: 1px solid rgba(255,182,193,0.4);
            box-shadow: 0 8px 32px rgba(156,39,176,0.1);
        }
        .stat-value { font-size: 1.8rem; font-weight: bold; background: linear-gradient(135deg, #e91e63, #9c27b0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { font-size: 0.8rem; opacity: 0.7; margin-top: 5px; }

        .admin-controls { text-align: center; margin-bottom: 20px; }
        .admin-login-btn { 
            border: none; padding: 14px 28px; font-size: 1rem; border-radius: 50px;
            cursor: pointer; transition: all 0.3s ease; font-weight: bold;
            background: rgba(255,255,255,0.5); backdrop-filter: blur(10px);
            color: #9c27b0; border: 1px solid rgba(156,39,176,0.3);
        }
        
        .admin-section { display: none; text-align: center; margin-bottom: 30px; padding: 20px; 
            background: rgba(255,255,255,0.2); border-radius: 20px; backdrop-filter: blur(15px);
            border: 1px solid rgba(255,182,193,0.3); }
        .admin-section.active { display: block; }
        .add-item-btn, .sync-btn, .reset-btn {
            border: none; padding: 14px 28px; font-size: 1rem; border-radius: 50px;
            cursor: pointer; margin: 5px; transition: all 0.3s ease; font-weight: bold;
        }
        .add-item-btn { background: white; color: #e91e63; box-shadow: 0 5px 15px rgba(233,30,99,0.2); }
        .sync-btn { background: rgba(76,175,80,0.2); color: #2e7d32; border: 1px solid rgba(76,175,80,0.3); }
        .reset-btn { background: rgba(244,67,54,0.2); color: #c62828; border: 1px solid rgba(244,67,54,0.3); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 9999; }
        .modal.active { display: flex !important; }
        .modal-content { 
            background: white; padding: 30px; border-radius: 25px; width: 90%; max-width: 500px;
            box-shadow: 0 20px 60px rgba(156,39,176,0.2); max-height: 85vh; overflow-y: auto;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #5c2d91; font-weight: 500; font-size: 0.9rem; }
        .form-group input, .form-group textarea, .form-group select { 
            width: 100%; padding: 12px; border: 2px solid #f8e8ff; border-radius: 12px;
            font-size: 1rem; font-family: inherit; }
        .form-group select { background: white; cursor: pointer; }
        .image-preview { width: 100%; height: 200px; border: 2px dashed #ffd1dc; border-radius: 15px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            background-size: cover; background-position: center; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-buttons .btn { 
            padding: 14px 24px; border: none; border-radius: 12px; font-size: 1rem; 
            cursor: pointer; font-weight: 500; flex: 1; transition: all 0.3s ease;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        .btn-primary { background: linear-gradient(135deg, #e91e63, #9c27b0); color: white; }
        .btn-secondary { background: #f8e8ff; color: #5c2d91; }
        
        .price-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 15px; }
        .price-card { 
            background: rgba(255,255,255,0.3); backdrop-filter: blur(20px);
            border-radius: 25px; overflow: hidden; border: 1px solid rgba(255,182,193,0.3);
            box-shadow: 0 8px 32px rgba(156,39,176,0.08); transition: all 0.3s ease;
            animation: fadeIn 0.4s ease;
        }
        .price-card:hover { transform: translateY(-8px); box-shadow: 0 20px 50px rgba(156,39,176,0.15); }
        .price-card.removing { animation: fadeOut 0.4s ease forwards; }
        .card-image { width: 100%; height: 230px; object-fit: cover; }
        .card-content { padding: 18px; }
        .card-category { font-size: 0.7rem; color: #e91e63; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; font-weight: 600; }
        .card-title { font-size: 1.3rem; font-weight: bold; color: #5c2d91; margin-bottom: 8px; }
        .card-details { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
        .card-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; color: white; }
        .card-badge.mg { background: linear-gradient(135deg, #e91e63, #ad1457); }
        .card-badge.quantity { background: linear-gradient(135deg, #7b1fa2, #4a148c); }
        .card-badge.zero { background: #f44336; animation: pulse 0.5s ease; }
        .card-flavors { color: #6a1b9a; margin-bottom: 8px; font-size: 0.9rem; line-height: 1.4; }
        .card-price { font-size: 1.6rem; font-weight: bold; background: linear-gradient(135deg, #e91e63, #9c27b0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        
        .card-sales-info { display: none; background: rgba(255,182,193,0.2); border-radius: 10px; padding: 6px 10px; margin-bottom: 8px; font-size: 0.8rem; color: #5c2d91; }
        .admin-mode .card-sales-info { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 4px; }
        .card-sales-info.pending { background: rgba(255,152,0,0.2); animation: glow 1.5s infinite; }
        
        .buy-btn { display: block; width: 100%; padding: 11px; background: linear-gradient(135deg, #e91e63, #ad1457); color: white; border: none; border-radius: 15px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: all 0.3s ease; text-align: center; }
        .buy-btn:hover { transform: scale(1.02); }
        .buy-btn.sold-out { background: #999; cursor: not-allowed; }
        .buy-btn.sold-out:hover { transform: none; }
        
        .confirm-btn, .cancel-btn {
            border: none; padding: 5px 10px; border-radius: 20px; cursor: pointer;
            font-size: 0.75rem; font-weight: bold; transition: all 0.3s ease; display: none;
        }
        .confirm-btn { background: linear-gradient(135deg, #4CAF50, #2e7d32); color: white; }
        .cancel-btn { background: linear-gradient(135deg, #f44336, #c62828); color: white; }
        .confirm-btn.show, .cancel-btn.show { display: inline-block; }
        .confirm-btn.show { animation: pulse 0.5s ease; }
        .confirm-btn:disabled, .cancel-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .card-buttons { display: none; gap: 6px; margin-top: 6px; }
        .admin-mode .card-buttons { display: flex; }
        .admin-mode .buy-btn { display: none; }
        .edit-btn, .delete-btn, .history-btn { border: none; padding: 8px; border-radius: 12px; cursor: pointer; font-size: 0.8rem; color: white; flex: 1; }
        .edit-btn { background: linear-gradient(135deg, #ff9800, #f57c00); }
        .delete-btn { background: linear-gradient(135deg, #f44336, #c62828); }
        .history-btn { background: linear-gradient(135deg, #2196F3, #1565C0); }
        
        .status-message { text-align: center; color: #5c2d91; margin-top: 10px; padding: 10px; border-radius: 10px; background: rgba(255,255,255,0.3); display: none; }
        .status-message.show { display: block; }
        
        .tg-setup { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 15px; margin-bottom: 20px; color: #5c2d91; text-align: center; }
        .tg-setup input { padding: 10px 15px; border-radius: 10px; border: 1px solid rgba(156,39,176,0.3); font-size: 1rem; width: 250px; text-align: center; margin: 10px 5px; }
        .tg-setup button { padding: 10px 20px; border-radius: 10px; border: none; background: linear-gradient(135deg, #e91e63, #9c27b0); color: white; font-size: 1rem; cursor: pointer; font-weight: bold; }
        
        .history-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 2000; }
        .history-modal.active { display: flex; }
        .history-content { background: white; padding: 25px; border-radius: 25px; width: 90%; max-width: 450px; max-height: 80vh; overflow-y: auto; }
        .history-item { padding: 10px; border-bottom: 1px solid #f8e8ff; color: #5c2d91; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
        
        .loading-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; color: #9c27b0; text-align: center; }
        .loading-spinner { width: 50px; height: 50px; border: 3px solid rgba(156,39,176,0.2); border-top: 3px solid #e91e63; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        
        .empty-category { text-align: center; padding: 40px; color: #9c27b0; opacity: 0.6; grid-column: 1 / -1; }
        
        @media (max-width: 768px) {
            .price-grid { grid-template-columns: 1fr; }
            .stats-panel { flex-direction: column; }
            .cat-tab { padding: 8px 16px; font-size: 0.8rem; }
            .search-wrapper { max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌸 Наш Прайс-лист</h1>
            <p>Нажми на "Купить" чтобы оформить заказ</p>
        </div>
        
        <div class="search-container">
            <div class="search-wrapper">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск по названию или вкусу...">
                <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
                <span class="search-icon">🔍</span>
            </div>
        </div>
        
        <div class="categories-nav" id="categoriesNav">
            <div class="cat-tab active" data-cat="all">Все</div>
        </div>
        
        <div class="stats-panel" id="statsPanel">
            <div class="stat-card"><div class="stat-value" id="totalItems">0</div><div class="stat-label">📦 Всего товаров</div></div>
            <div class="stat-card"><div class="stat-value" id="totalValue">0₽</div><div class="stat-label">💰 Общая стоимость</div></div>
            <div class="stat-card"><div class="stat-value" id="totalSold">0</div><div class="stat-label">🛒 Продано</div></div>
            <div class="stat-card"><div class="stat-value" id="totalRevenue">0₽</div><div class="stat-label">💵 Прибыль</div></div>
        </div>
        
        <div class="admin-controls">
            <button class="admin-login-btn" onclick="toggleAdmin()">🔑 Войти как админ</button>
        </div>
        
        <div class="admin-section" id="adminSection">
            <div class="tg-setup">
                <label>🔗 Telegram username:</label><br>
                <input type="text" id="tgUsername" value="danil_cooldown">
                <button onclick="saveTgUsername()">💾 Сохранить</button>
            </div>
            <button class="add-item-btn" onclick="openModal()">✨ Добавить товар</button>
            <button class="sync-btn" onclick="loadData()">🔄 Обновить из облака</button>
            <button class="reset-btn" onclick="resetAllStats()">🗑️ Сброс статистики</button>
            <div class="status-message" id="statusMessage"></div>
        </div>
        
        <div class="price-grid" id="priceGrid">
            <div class="loading-container" style="grid-column:1/-1;">
                <div class="loading-spinner"></div>
                <div>Загружаем товары...</div>
            </div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="color:#5c2d91;">Добавить товар</h2>
            <input type="hidden" id="editId">
            <div class="form-group"><label>📛 Название</label><input type="text" id="itemName"></div>
            <div class="form-group"><label>📂 Категория</label>
                <select id="itemCategory">
                    <option value="Жижи">💧 Жижи</option>
                    <option value="Одноразки">🚬 Одноразки</option>
                    <option value="Снюсы">👄 Снюсы</option>
                    <option value="Поды">💨 Поды</option>
                </select>
            </div>
            <div class="form-group"><label>⚡ МГ</label><input type="text" id="itemMg"></div>
            <div class="form-group"><label>🍓 Вкусы</label><textarea id="itemFlavors"></textarea></div>
            <div class="form-group"><label>📦 Количество (только цифра)</label><input type="number" id="itemQuantity" min="0" placeholder="3"></div>
            <div class="form-group"><label>💰 Цена (₽)</label><input type="number" id="itemPrice"></div>
            <div class="form-group"><label>📸 Фото</label><div class="image-preview" id="imagePreview"><span>Нажмите для загрузки</span></div><input type="file" id="imageInput" accept="image/*" style="display:none;"></div>
            <div class="modal-buttons"><button class="btn btn-secondary" onclick="closeModal()">Отмена</button><button class="btn btn-primary" onclick="saveItem()">Сохранить</button></div>
        </div>
    </div>
    
    <div class="history-modal" id="historyModal">
        <div class="history-content">
            <h3 style="color:#5c2d91;text-align:center;">📋 История продаж</h3>
            <div id="historyList"></div>
            <div id="historySummary" style="text-align:center;margin-top:15px;font-weight:bold;color:#9c27b0;"></div>
            <button class="btn btn-secondary" onclick="closeHistory()" style="margin-top:15px;width:100%;">Закрыть</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://api.npoint.io/55674e9c91b4698843d7';
        const DEFAULT_TG = 'danil_cooldown';
        let items = [];
        let currentImage = null;
        let isAdmin = false;
        let currentCategory = 'all';
        let searchQuery = '';
        let tgUsername = localStorage.getItem('tgUsername') || DEFAULT_TG;
        let salesData = {};
        let salesHistory = [];
        let pendingSales = {};

        const categories = ['Жижи', 'Одноразки', 'Снюсы', 'Поды'];
        const catEmojis = { 'Жижи': '💧', 'Одноразки': '🚬', 'Снюсы': '👄', 'Поды': '💨' };

        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('tgUsername').value = tgUsername;
            
            const preview = document.getElementById('imagePreview');
            const input = document.getElementById('imageInput');
            
            preview.addEventListener('click', () => input.click());
            preview.addEventListener('touchend', (e) => { e.preventDefault(); input.click(); });
            
            input.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const maxSize = 800;
                            let w = img.width, h = img.height;
                            if (w > h) { if (w > maxSize) { h *= maxSize / w; w = maxSize; } }
                            else { if (h > maxSize) { w *= maxSize / h; h = maxSize; } }
                            canvas.width = w; canvas.height = h;
                            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                            currentImage = canvas.toDataURL('image/jpeg', 0.8);
                            preview.style.backgroundImage = `url(${currentImage})`;
                            preview.classList.add('has-image');
                            preview.innerHTML = '';
                        };
                        img.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });

            const searchInput = document.getElementById('searchInput');
            const searchClear = document.getElementById('searchClear');
            
            searchInput.addEventListener('input', () => {
                searchQuery = searchInput.value.trim().toLowerCase();
                searchClear.classList.toggle('show', !!searchQuery);
                renderItems();
            });
            
            await loadData();
            buildCategories();
            
            document.getElementById('categoriesNav').addEventListener('click', (e) => {
                if (e.target.classList.contains('cat-tab')) {
                    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    currentCategory = e.target.dataset.cat;
                    renderItems();
                }
            });
        });

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            searchQuery = '';
            document.getElementById('searchClear').classList.remove('show');
            renderItems();
        }

        function buildCategories() {
            const nav = document.getElementById('categoriesNav');
            let html = '<div class="cat-tab active" data-cat="all">Все</div>';
            categories.forEach(cat => {
                const count = items.filter(i => i.category === cat).length;
                html += `<div class="cat-tab" data-cat="${cat}">${catEmojis[cat]} ${cat}<span class="count">${count}</span></div>`;
            });
            nav.innerHTML = html;
        }

        function getFilteredItems() {
            let filtered = currentCategory === 'all' ? [...items] : items.filter(i => i.category === currentCategory);
            if (searchQuery) {
                filtered = filtered.filter(i => 
                    i.name.toLowerCase().includes(searchQuery) || 
                    i.flavors.toLowerCase().includes(searchQuery) ||
                    (i.category && i.category.toLowerCase().includes(searchQuery))
                );
            }
            return filtered;
        }

        function saveTgUsername() {
            const input = document.getElementById('tgUsername').value.trim().replace('@', '');
            if (input) { tgUsername = input; localStorage.setItem('tgUsername', input); showStatus('✅ Сохранено!', 'success'); }
        }

        function buyItem(item) {
            if (item.quantity <= 0) return;
            const message = encodeURIComponent(`Здравствуйте! Хочу приобрести: ${item.name}, вкус: ${item.flavors}, ${item.mg} за ${item.price}₽`);
            window.open(`https://t.me/${tgUsername}?text=${message}`, '_blank');
            if (!pendingSales[item.id]) pendingSales[item.id] = 0;
            pendingSales[item.id]++;
            saveAllData();
            renderItems();
            showStatus('🔔 Новый заказ!', 'success');
        }

        function confirmSale(itemId) {
            const item = items.find(i => i.id === itemId);
            if (!item || item.quantity <= 0) return;
            if (!pendingSales[itemId] || pendingSales[itemId] <= 0) return;
            
            item.quantity--;
            pendingSales[itemId]--;
            if (pendingSales[itemId] <= 0) pendingSales[itemId] = 0;
            
            if (!salesData[itemId]) salesData[itemId] = { count: 0, revenue: 0, name: item.name };
            salesData[itemId].count++;
            salesData[itemId].revenue += parseInt(item.price);
            salesHistory.unshift({ date: new Date().toLocaleString('ru-RU'), name: item.name, price: parseInt(item.price), itemId });
            if (salesHistory.length > 100) salesHistory = salesHistory.slice(0, 100);
            
            if (item.quantity <= 0) {
                setTimeout(() => {
                    items = items.filter(i => i.id !== itemId);
                    saveAllData(); updateStats(); renderItems(); buildCategories();
                    showStatus('🗑️ Товар распродан и удалён!', 'success');
                }, 1500);
            }
            
            saveAllData(); updateStats(); renderItems(); buildCategories();
            showStatus(`✅ Продажа! +${item.price}₽`, 'success');
        }

        function cancelSale(itemId) {
            if (!pendingSales[itemId] || pendingSales[itemId] <= 0) return;
            pendingSales[itemId]--;
            if (pendingSales[itemId] <= 0) pendingSales[itemId] = 0;
            saveAllData();
            renderItems();
            showStatus('❌ Заказ отменён', 'error');
        }

        function updateStats() {
            const filtered = getFilteredItems();
            document.getElementById('totalItems').textContent = filtered.length;
            document.getElementById('totalValue').textContent = filtered.reduce((s, i) => s + (parseInt(i.price)*(i.quantity||0)), 0) + '₽';
            document.getElementById('totalSold').textContent = Object.values(salesData).reduce((s, d) => s + d.count, 0);
            document.getElementById('totalRevenue').textContent = Object.values(salesData).reduce((s, d) => s + d.revenue, 0) + '₽';
        }

        function resetAllStats() {
            if (confirm('Сбросить ВСЮ статистику и историю?')) {
                salesData = {}; salesHistory = []; pendingSales = {};
                saveAllData(); updateStats(); renderItems();
                showStatus('🗑️ Всё сброшено', 'success');
            }
        }

        function showHistory() {
            const modal = document.getElementById('historyModal');
            const list = document.getElementById('historyList');
            const summary = document.getElementById('historySummary');
            if (salesHistory.length === 0) {
                list.innerHTML = '<p style="text-align:center;color:#999;">Нет истории</p>';
                summary.textContent = '';
            } else {
                list.innerHTML = salesHistory.slice(0, 20).map(h => 
                    `<div class="history-item"><span>${h.name}</span><span style="font-size:0.8rem;opacity:0.7;">${h.date}</span><span style="font-weight:bold;">${h.price}₽</span></div>`
                ).join('');
                summary.textContent = `Продаж: ${salesHistory.length} | Сумма: ${salesHistory.reduce((s,h) => s+h.price, 0)}₽`;
            }
            modal.classList.add('active');
        }

        function closeHistory() { document.getElementById('historyModal').classList.remove('active'); }

        async function loadData() {
            try {
                const r = await fetch(API_URL);
                if (r.ok) { 
                    const d = await r.json(); 
                    items = d.items || []; 
                    salesData = d.salesData || {};
                    salesHistory = d.salesHistory || [];
                    pendingSales = d.pendingSales || {};
                }
            } catch (e) {}
            updateStats(); renderItems(); buildCategories();
        }

        async function saveAllData() {
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items, salesData, salesHistory, pendingSales })
                });
            } catch (e) {}
        }

        async function saveData() { await saveAllData(); showStatus('✅ Сохранено!', 'success'); }

        function toggleAdmin() {
            isAdmin = !isAdmin;
            if (isAdmin) {
                if (prompt('Пароль:') === 'admin123') {
                    document.getElementById('adminSection').classList.add('active');
                    document.querySelector('.admin-login-btn').textContent = '🔒 Выйти';
                    document.body.classList.add('admin-mode');
                    updateStats();
                } else { alert('Неверно!'); isAdmin = false; }
            } else {
                document.getElementById('adminSection').classList.remove('active');
                document.querySelector('.admin-login-btn').textContent = '🔑 Войти как админ';
                document.body.classList.remove('admin-mode');
            }
        }

        function showStatus(msg, type) {
            const el = document.getElementById('statusMessage');
            el.textContent = msg; el.className = 'status-message show';
            el.style.background = type === 'success' ? 'rgba(76,175,80,0.3)' : 'rgba(244,67,54,0.3)';
            setTimeout(() => el.classList.remove('show'), 2000);
        }

        function openModal(editItem) {
            document.getElementById('modal').classList.add('active');
            if (editItem) {
                document.getElementById('modalTitle').textContent = 'Редактировать';
                document.getElementById('editId').value = editItem.id;
                document.getElementById('itemName').value = editItem.name || '';
                document.getElementById('itemCategory').value = editItem.category || 'Жижи';
                document.getElementById('itemMg').value = editItem.mg || '';
                document.getElementById('itemFlavors').value = editItem.flavors || '';
                document.getElementById('itemQuantity').value = editItem.quantity || 0;
                document.getElementById('itemPrice').value = editItem.price || '';
                currentImage = editItem.image || null;
                const p = document.getElementById('imagePreview');
                if (currentImage) {
                    p.style.backgroundImage = 'url(' + currentImage + ')';
                    p.classList.add('has-image'); p.innerHTML = '';
                } else {
                    p.style.backgroundImage = ''; p.classList.remove('has-image');
                    p.innerHTML = '<span>Нажмите для загрузки</span>';
                }
            } else {
                document.getElementById('modalTitle').textContent = 'Добавить товар';
                document.getElementById('editId').value = '';
                ['itemName','itemMg','itemFlavors','itemQuantity','itemPrice'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('itemCategory').value = 'Жижи';
                currentImage = null;
                const p = document.getElementById('imagePreview');
                p.style.backgroundImage = ''; p.classList.remove('has-image');
                p.innerHTML = '<span>Нажмите для загрузки</span>';
            }
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        async function saveItem() {
            const editId = document.getElementById('editId').value;
            const n = document.getElementById('itemName').value.trim();
            const cat = document.getElementById('itemCategory').value;
            const m = document.getElementById('itemMg').value.trim();
            const f = document.getElementById('itemFlavors').value.trim();
            const q = parseInt(document.getElementById('itemQuantity').value) || 0;
            const p = document.getElementById('itemPrice').value.trim();
            if (!n || !m || !f || p === '' || !currentImage) { alert('Заполните все поля!'); return; }
            
            const itemData = { id: editId ? parseInt(editId) : Date.now(), name: n, category: cat, mg: m, flavors: f, quantity: q, price: p, image: currentImage };
            if (editId) {
                const index = items.findIndex(i => i.id == editId);
                if (index !== -1) items[index] = itemData;
            } else { items.push(itemData); }
            
            await saveData(); updateStats(); renderItems(); buildCategories(); closeModal();
        }

        async function deleteItem(id) {
            if (confirm('Удалить?')) { 
                items = items.filter(i => i.id !== id); 
                await saveData(); updateStats(); renderItems(); buildCategories(); 
            }
        }

        function editItem(id) {
            const item = items.find(i => i.id === id);
            if (item) openModal(item);
        }

        function renderItems() {
            const grid = document.getElementById('priceGrid');
            const filtered = getFilteredItems();
            
            if (items.length === 0) {
                grid.innerHTML = '<div class="empty-category">🌸 Товары не добавлены</div>';
                updateStats(); return;
            }
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-category">📂 Ничего не найдено</div>';
                updateStats(); return;
            }
            
            grid.innerHTML = '';
            filtered.forEach(item => {
                const sold = salesData[item.id] || { count: 0, revenue: 0 };
                const pending = pendingSales[item.id] || 0;
                const isZero = item.quantity <= 0;
                
                const card = document.createElement('div');
                card.className = 'price-card';
                card.innerHTML = 
                    '<img src="' + item.image + '" class="card-image">' +
                    '<div class="card-content">' +
                    '<div class="card-category">' + (catEmojis[item.category]||'📦') + ' ' + (item.category||'') + '</div>' +
                    '<h3 class="card-title">' + item.name + '</h3>' +
                    '<div class="card-details"><span class="card-badge mg">⚡ ' + item.mg + '</span><span class="card-badge quantity' + (isZero ? ' zero' : '') + '">📦 ' + item.quantity + ' шт</span></div>' +
                    '<div class="card-flavors">🍓 ' + item.flavors + '</div>' +
                    '<div class="card-price">' + item.price + ' ₽</div>' +
                    '<div class="card-sales-info' + (pending ? ' pending' : '') + '">' +
                    '<span>📊 ' + sold.count + '</span><span>💵 ' + sold.revenue + '₽</span>' +
                    (pending ? '<span style="color:#ff9800;">🔔' + pending + '</span>' : '') +
                    '<button class="confirm-btn' + (pending ? ' show' : '') + '" onclick="confirmSale(' + item.id + ')" ' + (item.quantity <= 0 ? 'disabled' : '') + '>✅</button>' +
                    '<button class="cancel-btn' + (pending ? ' show' : '') + '" onclick="cancelSale(' + item.id + ')">✕</button>' +
                    '</div>' +
                    '<button class="buy-btn' + (isZero ? ' sold-out' : '') + '" onclick="buyItem(' + JSON.stringify(item).replace(/"/g, '&quot;') + ')" ' + (isZero ? 'disabled' : '') + '>' + (isZero ? 'Нет в наличии' : '💬 Купить') + '</button>' +
                    '<div class="card-buttons">' +
                    '<button class="edit-btn" onclick="editItem(' + item.id + ')">✏️</button>' +
                    '<button class="history-btn" onclick="showHistory()">📊</button>' +
                    '<button class="delete-btn" onclick="deleteItem(' + item.id + ')">🗑️</button>' +
                    '</div></div>';
                grid.appendChild(card);
            });
            updateStats();
        }
    </script>
</body>
</html>
