<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN | Smoky Notes</title>
    <meta name="theme-color" content="#e91e63">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#ffd1dc,#f8e8ff);min-height:100vh;padding:15px;color:#5c2d91}
        body.dark{background:linear-gradient(135deg,#0a0015,#1a0030);color:#e0d0f0}
        .container{max-width:1200px;margin:0 auto}
        .nav-bar{display:flex;justify-content:center;gap:10px;margin-bottom:20px;background:rgba(255,255,255,0.3);backdrop-filter:blur(20px);border-radius:20px;padding:10px;position:sticky;top:10px;z-index:100}
        .nav-tab{padding:14px 28px;border-radius:16px;cursor:pointer;font-weight:700;border:none;background:transparent;color:inherit}
        .nav-tab.active{background:linear-gradient(135deg,#e91e63,#9c27b0);color:white}
        .page{display:none}.page.active{display:block}
        .header{text-align:center;margin-bottom:25px}
        .logo{width:80px;height:80px;border-radius:50%;margin:0 auto 10px;object-fit:cover}
        .header h1{font-size:2.5rem;background:linear-gradient(135deg,#e91e63,#9c27b0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .login-bar{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
        .login-bar input{padding:12px 18px;border-radius:25px;border:1px solid rgba(0,0,0,0.1);background:white;font-size:0.9rem;width:160px}
        .login-bar button{padding:12px 24px;border-radius:25px;border:none;background:linear-gradient(135deg,#e91e63,#9c27b0);color:white;cursor:pointer;font-weight:600}
        .quick-actions{display:none;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}.quick-actions.show{display:flex}
        .quick-btn{padding:10px 18px;border-radius:20px;border:1px solid rgba(0,0,0,0.1);background:rgba(255,255,255,0.5);cursor:pointer;font-size:0.85rem;font-weight:600}
        .search-input{width:100%;max-width:400px;padding:12px 18px;border-radius:25px;border:1px solid rgba(0,0,0,0.1);background:white;font-size:0.9rem;outline:none;margin:0 auto 15px;display:block}
        .sort-bar{display:flex;gap:8px;justify-content:center;margin-bottom:15px}
        .sort-btn{padding:8px 14px;border-radius:20px;border:1px solid rgba(0,0,0,0.1);background:rgba(255,255,255,0.5);cursor:pointer;font-size:0.8rem}
        .sort-btn.active{background:white;color:#e91e63}
        .categories-nav{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:15px}
        .cat-tab{padding:8px 16px;border-radius:20px;cursor:pointer;font-weight:600;font-size:0.85rem;background:rgba(255,255,255,0.5);border:2px solid transparent}
        .cat-tab.active{background:white;color:#e91e63;border-color:#e91e63}
        .cat-tab .count{background:#e91e63;color:white;padding:2px 8px;border-radius:12px;margin-left:6px;font-size:0.7rem}
        .stats-panel{display:none;gap:15px;margin-bottom:20px;flex-wrap:wrap;justify-content:center}.stats-panel.show{display:flex}
        .stat-card{background:rgba(255,255,255,0.3);border-radius:20px;padding:18px 22px;text-align:center;min-width:140px;flex:1}
        .stat-value{font-size:1.8rem;font-weight:bold}
        .price-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:15px;padding-bottom:100px}
        .price-card{background:rgba(255,255,255,0.3);backdrop-filter:blur(20px);border-radius:20px;overflow:hidden;border:1px solid rgba(0,0,0,0.1)}
        .card-image{width:100%;height:220px;object-fit:cover}.card-content{padding:15px}
        .card-title{font-size:1.2rem;font-weight:700;margin-bottom:6px}
        .card-price{font-size:1.4rem;font-weight:700;margin-bottom:8px}
        .buy-btn,.cart-btn{width:100%;padding:10px;color:white;border:none;border-radius:12px;font-size:0.9rem;font-weight:700;cursor:pointer;margin-bottom:6px}
        .buy-btn{background:linear-gradient(135deg,#e91e63,#9c27b0)}.cart-btn{background:linear-gradient(135deg,#ff9800,#ff5722)}
        .cart-panel{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.9);backdrop-filter:blur(25px);border-radius:20px;padding:15px 25px;z-index:200;display:none;align-items:center;gap:15px;box-shadow:0 10px 40px rgba(233,30,99,0.3)}
        .cart-panel.show{display:flex}.cart-count{background:#e91e63;color:white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:bold}
        .cart-panel-btn{padding:10px 20px;border-radius:15px;border:none;cursor:pointer;font-weight:bold}.cart-view-btn{background:#f8e8ff;color:#5c2d91}.cart-order-btn{background:#e91e63;color:white}
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;z-index:3000}.modal-overlay.show{display:flex}
        .modal-content{background:white;border-radius:20px;padding:25px;max-width:500px;width:90%;max-height:85vh;overflow-y:auto}
        body.dark .modal-content{background:#1a0a25}
        .ga-card{background:rgba(255,255,255,0.3);border-radius:20px;padding:20px;margin-bottom:15px}
        .ga-input{width:100%;padding:12px;border-radius:12px;border:1px solid rgba(0,0,0,0.1);background:white;font-size:0.9rem;margin-bottom:10px}
        .ga-btn{width:100%;padding:12px;border-radius:12px;border:none;font-weight:700;cursor:pointer;font-size:0.9rem;margin-bottom:8px;color:white}
        .btn-cyan{background:linear-gradient(135deg,#00e5ff,#0099cc)}.btn-gold{background:linear-gradient(135deg,#ffd700,#ff8c00)}.btn-magenta{background:linear-gradient(135deg,#ff00ff,#cc0099)}
        @media(max-width:768px){.price-grid{grid-template-columns:1fr}.nav-tab{padding:10px 16px;font-size:0.85rem}.cart-panel{flex-wrap:wrap;justify-content:center;width:95%}}
    </style>
</head>
<body>
<div class="container">
<div class="nav-bar">
    <button class="nav-tab active" onclick="switchPage('shop')">🛒 Магазин</button>
    <button class="nav-tab" onclick="switchPage('giveaway')">🎰 Розыгрыш</button>
</div>

<div class="page active" id="pageShop">
    <div class="header">
        <img src="SN.jpg" alt="Smoky Notes" class="logo" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>'">
        <h1>Smoky Notes</h1><p>Доставка в удобное время и место 🚗</p>
    </div>
    <div class="login-bar"><input type="password" id="shopPass" placeholder="Пароль или код"><button onclick="shopLogin()">🔐 Войти</button><span id="shopRole"></span></div>
    <div class="quick-actions" id="shopActions">
        <button class="quick-btn" onclick="openShopModal()">✨ Товар</button>
        <button class="quick-btn admin-only" style="border-color:#4CAF50;color:#4CAF50" onclick="addModerQuick()">👑 Модер</button>
        <button class="quick-btn admin-only" style="border-color:#2196F3;color:#2196F3" onclick="addHelperQuick()">🤝 Хелпер</button>
        <button class="quick-btn admin-only" onclick="showStaffPanel()">👥 Персонал</button>
        <button class="quick-btn admin-only" style="border-color:#FFD700;color:#FFD700" onclick="showFinanceTable()">💰 Доходы</button>
        <button class="quick-btn admin-only" style="border-color:#9c27b0;color:#9c27b0" onclick="showActionLogs()">📋 Логи</button>
        <button class="quick-btn success" onclick="uploadAllToNpoint()">📥 Выгрузить</button>
        <button class="quick-btn" onclick="loadAllFromNpoint()">📤 Загрузить</button>
        <button class="quick-btn" onclick="restoreBackup()">🔄 Бэкап</button>
        <button class="quick-btn" onclick="showShopHistory()">📊 История</button>
        <button class="quick-btn" onclick="exportCSV()">📥 Экспорт</button>
    </div>
    <div class="status-message" id="shopStatus" style="text-align:center;padding:10px;display:none;margin-bottom:15px"></div>
    <input type="text" class="search-input" id="shopSearch" placeholder="🔍 Поиск товаров..." oninput="renderShop()">
    <div class="sort-bar">
        <button class="sort-btn active" onclick="setSort('default')">📋 Обычно</button>
        <button class="sort-btn" onclick="setSort('price-asc')">💰 Дешевле</button>
        <button class="sort-btn" onclick="setSort('price-desc')">💎 Дороже</button>
        <button class="sort-btn" onclick="setSort('popular')">🔥 Популярнее</button>
    </div>
    <div class="categories-nav" id="categoriesNav"></div>
    <div class="stats-panel" id="statsPanel">
        <div class="stat-card"><div class="stat-value" id="totalItems">0</div><div class="stat-label">📦 Товаров</div></div>
        <div class="stat-card"><div class="stat-value" id="totalValue">0₽</div><div class="stat-label">💰 Стоимость</div></div>
        <div class="stat-card"><div class="stat-value" id="totalSold">0</div><div class="stat-label">🛒 Продано</div></div>
        <div class="stat-card"><div class="stat-value" id="totalRevenue">0₽</div><div class="stat-label">💵 Прибыль</div></div>
    </div>
    <div class="price-grid" id="priceGrid"><div style="grid-column:1/-1;text-align:center;padding:40px;opacity:0.5;">🌸 Загрузка товаров...</div></div>
</div>

<div class="page" id="pageGiveaway">
    <div class="header"><span style="font-size:3rem">🎰</span><h1>Giveaway</h1><p>участвуй • выигрывай • забирай</p></div>
    <div class="login-bar"><input type="password" id="gaPass" placeholder="Пароль или код"><button onclick="gaLogin()">🔐 Войти</button><span id="gaRole"></span></div>
    <div id="gaContent"></div>
</div>
</div>

<div class="cart-panel" id="cartPanel">
    <span class="cart-count" id="cartCountBadge">0</span><span id="cartInfo">0 тов. · 0₽</span>
    <button class="cart-panel-btn cart-view-btn" onclick="openCartModal()">🛒</button>
    <button class="cart-panel-btn cart-order-btn" onclick="checkout()">💬 Заказать</button>
</div>

<div class="modal-overlay" id="cartModal">
    <div class="modal-content">
        <h3>🛒 Корзина</h3>
        <div id="cartItemsList"></div><div id="cartTotal" style="font-size:1.3rem;font-weight:700;margin:15px 0">Итого: 0₽</div>
        <button class="buy-btn" onclick="checkout()" style="width:100%;background:#4CAF50">💬 Оформить заказ</button>
        <button onclick="closeCartModal()" style="width:100%;margin-top:8px;padding:10px;border-radius:12px;border:1px solid #ccc;background:#f5f5f5;cursor:pointer">Закрыть</button>
    </div>
</div>

<div class="modal-overlay" id="shopModal">
    <div class="modal-content" style="max-width:550px">
        <h3 id="shopModalTitle">✨ Добавить товар</h3>
        <input type="hidden" id="editItemId">
        <div style="margin-bottom:10px"><label>📛 Название</label><input type="text" id="itemName" style="width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;margin-top:4px"></div>
        <div style="margin-bottom:10px"><label>📂 Категория</label><select id="itemCategory" style="width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;margin-top:4px"><option value="Жижи">💧 Жижи</option><option value="Одноразки">🚬 Одноразки</option><option value="Снюсы">👄 Снюсы</option><option value="Поды">💨 Поды</option></select></div>
        <div style="display:flex;gap:10px;margin-bottom:10px"><div style="flex:1"><label>⚡ МГ</label><input type="text" id="itemMg" style="width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;margin-top:4px"></div><div style="flex:1"><label>📦 Кол-во</label><input type="number" id="itemQuantity" min="0" value="10" style="width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;margin-top:4px"></div></div>
        <div style="margin-bottom:10px"><label>🍓 Вкусы</label><textarea id="itemFlavors" rows="2" style="width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;margin-top:4px"></textarea></div>
        <div style="margin-bottom:10px"><label>💰 Цена (₽)</label><input type="number" id="itemPrice" style="width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;margin-top:4px"></div>
        <div style="margin-bottom:10px"><label>📸 Ссылка на фото</label><input type="text" id="itemImage" placeholder="https://..." style="width:100%;padding:10px;border-radius:10px;border:1px solid #ccc;margin-top:4px"></div>
        <div style="display:flex;gap:10px;margin-top:15px"><button onclick="closeShopModal()" style="flex:1;padding:12px;border-radius:12px;border:1px solid #ccc;background:#f5f5f5;cursor:pointer">Отмена</button><button onclick="saveShopItem()" style="flex:2;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#e91e63,#9c27b0);color:white;cursor:pointer;font-weight:700">💾 Сохранить</button></div>
    </div>
</div>

<script>
const NP='https://api.npoint.io/55674e9c91b4698843d7';
let currentRole=null,currentCode=null,items=[],salesData={},salesHistory=[],pendingSales={},cart=[];
let shopSort='default',shopCategory='all';
const categories=['Жижи','Одноразки','Снюсы','Поды'],catEmojis={'Жижи':'💧','Одноразки':'🚬','Снюсы':'👄','Поды':'💨'};
let gaParticipants=[],gaWinner=null,gaSecretCode='WIN2024',gaRegOpen=true;

function switchPage(p){document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page'+p.charAt(0).toUpperCase()+p.slice(1)).classList.add('active');event.target.classList.add('active');if(p==='shop')renderShop();if(p==='giveaway')renderGa();}

function shopLogin(){const pass=document.getElementById('shopPass').value.trim();if(pass==='150420'){currentRole='admin';currentCode=null;updateShopUI();return}const staff=JSON.parse(localStorage.getItem('shopStaff')||'[]');const user=staff.find(s=>s.code===pass);if(!user){alert('❌ Неверный пароль!');return}currentRole=user.role;currentCode=pass;updateShopUI();}
function updateShopUI(){document.getElementById('shopActions').classList.add('show');document.getElementById('statsPanel').classList.add('show');document.getElementById('shopRole').innerHTML=currentRole==='admin'?'👑 Админ':currentRole==='moder'?'👑 Модер':'🤝 Хелпер';document.getElementById('shopPass').style.display='none';renderShop();buildCategories();}

function loadShopData(){const saved=localStorage.getItem('priceData');if(saved){try{const d=JSON.parse(saved);items=d.items||[];salesData=d.salesData||{};salesHistory=d.salesHistory||[];}catch(e){}}renderShop();buildCategories();updateStats()}
function saveAllData(){localStorage.setItem('priceData',JSON.stringify({items,salesData,salesHistory,pendingSales}))}
function getFilteredItems(){let f=shopCategory==='all'?items.slice():items.filter(i=>i.category===shopCategory);const q=(document.getElementById('shopSearch')?.value||'').trim().toLowerCase();if(q)f=f.filter(i=>i.name.toLowerCase().includes(q)||i.flavors.toLowerCase().includes(q));if(shopSort==='price-asc')f.sort((a,b)=>parseInt(a.price)-parseInt(b.price));else if(shopSort==='price-desc')f.sort((a,b)=>parseInt(b.price)-parseInt(a.price));return f}
function setSort(m){shopSort=m;document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');renderShop()}
function buildCategories(){const n=document.getElementById('categoriesNav');let h='<div class="cat-tab active" data-cat="all" onclick="filterCategory(\'all\',this)">Все</div>';categories.forEach(c=>{const cnt=items.filter(i=>i.category===c).length;if(cnt>0)h+=`<div class="cat-tab" data-cat="${c}" onclick="filterCategory('${c}',this)">${catEmojis[c]} ${c} <span class="count">${cnt}</span></div>`});n.innerHTML=h}
function filterCategory(cat,btn){shopCategory=cat;document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');renderShop()}
function updateStats(){const ci=shopCategory==='all'?items:items.filter(i=>i.category===shopCategory);let st=0,sr=0;items.forEach(i=>{const s=salesData[i.id];if(s){st+=s.count||0;sr+=s.revenue||0}});document.getElementById('totalItems').textContent=ci.length;document.getElementById('totalValue').textContent=ci.reduce((s,i)=>s+(parseInt(i.price)*(i.quantity||0)),0)+'₽';document.getElementById('totalSold').textContent=st;document.getElementById('totalRevenue').textContent=sr+'₽'}
function renderShop(){const grid=document.getElementById('priceGrid'),filtered=getFilteredItems();if(items.length===0){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;opacity:0.5">🌸 Товары не добавлены</div>';return}if(filtered.length===0){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;opacity:0.5">📂 Ничего не найдено</div>';return}grid.innerHTML=filtered.map(item=>{const sold=salesData[item.id]||{count:0,revenue:0},pending=pendingSales[item.id]||0;return`<div class="price-card"><img src="${item.image}" class="card-image" onerror="this.src='https://via.placeholder.com/300x220?text=Нет+фото'"><div class="card-content"><div class="card-category">${catEmojis[item.category]||'📦'} ${item.category||''}</div><h3 class="card-title">${item.name}</h3><div>⚡ ${item.mg} | 📦 ${item.quantity} шт</div><div>🍓 ${item.flavors}</div><div class="card-price">${item.price} ₽</div><div>📊 ${sold.count} | 💵 ${sold.revenue}₽ ${pending>0?'🔔 '+pending:''}</div><button class="buy-btn" onclick="buyShopItem(${item.id})">💬 Купить</button><button class="cart-btn" onclick="addToCart(${item.id})">🛒 В корзину</button></div></div>`}).join('');updateStats()}
function buyShopItem(id){const item=items.find(i=>i.id==id);if(!item||item.quantity<=0)return;const msg=encodeURIComponent(`Хочу приобрести: ${item.name}, ${item.flavors}, ${item.mg} за ${item.price}₽`);window.open('https://t.me/danil_cooldown?text='+msg,'_blank');if(!pendingSales[id])pendingSales[id]=0;pendingSales[id]++;saveAllData();renderShop();showStatus('🔔 Новый заказ!')}
function addToCart(id){const item=items.find(i=>i.id==id);if(!item)return;const e=cart.find(c=>c.id==id);if(e)e.qty++;else cart.push({id:item.id,name:item.name,price:parseInt(item.price),qty:1});updateCartPanel();showStatus('🛒 Добавлено!')}
function updateCartPanel(){const n=cart.reduce((s,c)=>s+c.qty,0);const t=cart.reduce((s,c)=>s+c.price*c.qty,0);document.getElementById('cartCountBadge').textContent=n;document.getElementById('cartInfo').textContent=n+' тов. · '+t+'₽';document.getElementById('cartPanel').classList.toggle('show',n>0)}
function openCartModal(){document.getElementById('cartModal').classList.add('show');renderCartItems()}
function closeCartModal(){document.getElementById('cartModal').classList.remove('show')}
function renderCartItems(){const el=document.getElementById('cartItemsList');if(cart.length===0){el.innerHTML='<p>Корзина пуста</p>';return}let t=0;el.innerHTML=cart.map((c,i)=>{t+=c.price*c.qty;return`<div style="padding:10px;border-bottom:1px solid #eee">${c.name} x${c.qty} = ${c.price*c.qty}₽ <button onclick="cart.splice(${i},1);updateCartPanel();renderCartItems()" style="color:red;border:none;background:none;cursor:pointer">✕</button></div>`}).join('');document.getElementById('cartTotal').textContent='Итого: '+t+'₽'}
function checkout(){if(cart.length===0)return;let msg='Новый заказ:\n\n',total=0;cart.forEach(c=>{msg+=`• ${c.name} x${c.qty} = ${c.price*c.qty}₽\n`;total+=c.price*c.qty});msg+=`\nИтого: ${total}₽`;window.open('https://t.me/danil_cooldown?text='+encodeURIComponent(msg),'_blank');cart=[];updateCartPanel();closeCartModal();showStatus('✅ Заказ отправлен!')}

function openShopModal(editItem=null){document.getElementById('editItemId').value='';document.getElementById('itemName').value='';document.getElementById('itemCategory').value='Жижи';document.getElementById('itemMg').value='';document.getElementById('itemFlavors').value='';document.getElementById('itemQuantity').value='10';document.getElementById('itemPrice').value='';document.getElementById('itemImage').value='';if(editItem){document.getElementById('shopModalTitle').textContent='✏️ Редактировать';document.getElementById('editItemId').value=editItem.id;document.getElementById('itemName').value=editItem.name;document.getElementById('itemCategory').value=editItem.category;document.getElementById('itemMg').value=editItem.mg;document.getElementById('itemFlavors').value=editItem.flavors;document.getElementById('itemQuantity').value=editItem.quantity;document.getElementById('itemPrice').value=editItem.price;document.getElementById('itemImage').value=editItem.image||''}else{document.getElementById('shopModalTitle').textContent='✨ Добавить товар'}document.getElementById('shopModal').classList.add('show')}
function closeShopModal(){document.getElementById('shopModal').classList.remove('show')}
function saveShopItem(){const editId=document.getElementById('editItemId').value;const name=document.getElementById('itemName').value.trim();const cat=document.getElementById('itemCategory').value;const mg=document.getElementById('itemMg').value.trim();const fl=document.getElementById('itemFlavors').value.trim();const qty=parseInt(document.getElementById('itemQuantity').value)||10;const price=document.getElementById('itemPrice').value.trim();const img=document.getElementById('itemImage').value.trim()||'https://via.placeholder.com/300';if(!name||!price){alert('❌ Заполните название и цену!');return}if(editId){const idx=items.findIndex(i=>String(i.id)===String(editId));if(idx!==-1){items[idx].name=name;items[idx].category=cat;items[idx].mg=mg;items[idx].flavors=fl;items[idx].quantity=qty;items[idx].price=price;items[idx].image=img}}else{items.push({id:Date.now(),name,category:cat,mg,flavors:fl,quantity:qty,price,image:img})}saveAllData();renderShop();buildCategories();closeShopModal();showStatus('✅ Сохранено!')}

function addModerQuick(){const un=prompt('Имя модератора:');if(!un)return;const s=JSON.parse(localStorage.getItem('shopStaff')||'[]'),code='MOD_'+Math.random().toString(36).substr(2,8).toUpperCase();s.push({username:un,code,role:'moder',createdAt:new Date().toLocaleString('ru-RU')});localStorage.setItem('shopStaff',JSON.stringify(s));alert('✅ Модератор создан! Код: '+code)}
function addHelperQuick(){const staff=JSON.parse(localStorage.getItem('shopStaff')||'[]'),moders=staff.filter(s=>s.role==='moder');if(moders.length===0){alert('Сначала создайте модератора!');return}let list='Выберите модератора:\n';moders.forEach((m,i)=>{list+=(i+1)+'. '+m.username+' ('+m.code+')\n'});const n=parseInt(prompt(list));if(!n||n<1||n>moders.length)return;const un=prompt('Имя хелпера:');if(!un)return;const s=JSON.parse(localStorage.getItem('shopStaff')||'[]'),code='HLP_'+Math.random().toString(36).substr(2,8).toUpperCase();s.push({username:un,code,role:'helper',moderatorCode:moders[n-1].code,createdAt:new Date().toLocaleString('ru-RU')});localStorage.setItem('shopStaff',JSON.stringify(s));alert('✅ Хелпер создан! Код: '+code)}

function uploadAllToNpoint(){if(currentRole!=='admin')return;const d={items,salesData,salesHistory,pendingSales,shopStaff:JSON.parse(localStorage.getItem('shopStaff')||'[]'),gaParticipants,gaWinner};fetch(NP,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(r=>r.ok?showStatus('✅ Выгружено!'):showStatus('❌ Ошибка')).catch(()=>showStatus('❌ Нет связи'))}
function loadAllFromNpoint(){if(currentRole!=='admin')return;fetch(NP).then(r=>r.json()).then(d=>{items=d.items||[];salesData=d.salesData||{};if(d.shopStaff)localStorage.setItem('shopStaff',JSON.stringify(d.shopStaff));saveAllData();renderShop();buildCategories();updateStats();showStatus('✅ Загружено!')}).catch(()=>showStatus('❌ Нет связи'))}
function showStatus(msg){const el=document.getElementById('shopStatus');el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',2000)}
function showShopHistory(){alert(salesHistory.slice(0,10).map(h=>h.date+' | '+h.name+' | '+h.price+'₽').join('\n')||'Нет истории')}
function exportCSV(){let csv='Название;Категория;МГ;Вкусы;Кол-во;Цена\n';items.forEach(i=>{csv+=`"${i.name}";"${i.category}";"${i.mg}";"${i.flavors}";${i.quantity};${i.price}\n`});const b=new Blob(['\uFEFF'+csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='price.csv';a.click()}
function restoreBackup(){const b=localStorage.getItem('autoBackup');if(b){const d=JSON.parse(b);items=d.items;salesData=d.salesData;salesHistory=d.salesHistory;saveAllData();renderShop();buildCategories();showStatus('✅ Восстановлено!')}else showStatus('❌ Бэкап не найден')}
function showStaffPanel(){const staff=JSON.parse(localStorage.getItem('shopStaff')||'[]');let text='👥 Персонал:\n\n';staff.forEach(s=>{text+=`${s.role==='moder'?'👑':'🤝'} ${s.username} | ${s.code}\n`});alert(text||'Нет сотрудников')}
function showFinanceTable(){alert('💰 Раздел в разработке')}
function showActionLogs(){alert('📋 Логи в разработке')}

function renderGa(){const c=document.getElementById('gaContent');if(!currentRole){c.innerHTML=`<div class="ga-card"><h3>🎰 Участвовать</h3><input class="ga-input" id="gaName" placeholder="Имя"><input class="ga-input" id="gaTg" placeholder="@telegram"><input class="ga-input" id="gaCode" placeholder="Код из канала"><button class="ga-btn btn-cyan" onclick="gaParticipate()">🎯 Участвовать!</button></div><div class="ga-card"><h3>👥 Участники: ${gaParticipants.filter(p=>p.status==='approved').length}</h3></div>`;return}c.innerHTML=`<div class="ga-card"><h3>⚙️ Управление</h3><button class="ga-btn btn-gold" onclick="gaPickWinner()">🎰 Выбрать победителя</button></div>`}
function gaParticipate(){const n=document.getElementById('gaName')?.value.trim(),tg=document.getElementById('gaTg')?.value.trim(),cd=document.getElementById('gaCode')?.value.trim();if(!n||!tg||!cd)return;if(cd.toUpperCase()!==gaSecretCode.toUpperCase()){alert('❌ Неверный код!');return}gaParticipants.push({name:n,tg,status:'approved'});alert('✅ Участвуете!');renderGa()}
function gaPickWinner(){if(gaParticipants.length===0)return;gaWinner=gaParticipants[Math.floor(Math.random()*gaParticipants.length)];alert('🏆 Победитель: '+gaWinner.name+' ('+gaWinner.tg+')');renderGa()}
function gaLogin(){const pass=document.getElementById('gaPass').value.trim();if(pass==='150420'){currentRole='admin';document.getElementById('gaRole').innerHTML='👑 Админ';renderGa();return}const staff=JSON.parse(localStorage.getItem('shopStaff')||'[]');const user=staff.find(s=>s.code===pass);if(!user){alert('❌ Неверный пароль!');return}currentRole=user.role;document.getElementById('gaRole').innerHTML=currentRole==='moder'?'👑 Модер':'🤝 Хелпер';renderGa()}

document.addEventListener('DOMContentLoaded',function(){loadShopData();updateCartPanel();setInterval(()=>{if(items.length>0)localStorage.setItem('autoBackup',JSON.stringify({items,salesData,salesHistory}))},3600000)});
</script>
