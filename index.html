<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smoky Notes</title>
    <meta name="theme-color" content="#e91e63">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 5px rgba(255,152,0,0.3); } 50% { box-shadow: 0 0 15px rgba(255,152,0,0.6); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes slideUp { from { transform: translateX(-50%) translateY(100px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        :root {
            --bg: linear-gradient(135deg, #ffd1dc, #f8e8ff, #ffe4e1, #fff0f5);
            --text: #5c2d91; --card: rgba(255,255,255,0.3); --card-border: rgba(255,182,193,0.3);
            --btn-bg: rgba(255,255,255,0.4); --modal-bg: white; --input-bg: white; --input-border: #f8e8ff;
            --stat-bg: rgba(255,255,255,0.25); --stat-gradient: linear-gradient(135deg, #e91e63, #9c27b0);
        }
        body.dark {
            --bg: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460, #1a1a1a);
            --text: #ccc; --card: rgba(20,20,40,0.6); --card-border: rgba(255,255,255,0.08);
            --btn-bg: rgba(30,30,50,0.5); --modal-bg: #1a1a2e; --input-bg: #16213e; --input-border: #333;
            --stat-bg: rgba(30,30,50,0.6);
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); min-height: 100vh; padding: 20px; transition: all 0.5s ease; color: var(--text); }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 20px; }
        .logo { width: 80px; height: 80px; object-fit: cover; border-radius: 50%; margin-bottom: 10px; box-shadow: 0 4px 15px rgba(233,30,99,0.2); }
        .header h1 { font-size: 3rem; background: var(--stat-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 3s linear infinite; }
        .header p { color: var(--text); opacity: 0.8; }
        .theme-toggle { width: 45px; height: 45px; border-radius: 50%; cursor: pointer; background: var(--card); border: 1px solid var(--card-border); font-size: 1.3rem; display: flex; align-items: center; justify-content: center; position: fixed; top: 15px; right: 15px; z-index: 500; }
        .quick-actions { display: none; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 15px; }
        .admin-mode .quick-actions { display: flex; }
        .quick-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--card-border); background: var(--btn-bg); color: var(--text); cursor: pointer; font-size: 0.8rem; }
        .quick-btn.danger { border-color: #f44336; color: #f44336; }
        .quick-btn.success { border-color: #4CAF50; color: #4CAF50; }
        .search-container { display: flex; justify-content: center; margin-bottom: 15px; }
        .search-wrapper { position: relative; width: 100%; max-width: 400px; }
        .search-input { width: 100%; padding: 14px 40px 14px 20px; border-radius: 50px; border: 2px solid var(--card-border); background: var(--input-bg); color: var(--text); font-size: 1rem; outline: none; }
        .search-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); }
        .search-clear { position: absolute; right: 40px; top: 50%; transform: translateY(-50%); cursor: pointer; background: none; border: none; color: var(--text); display: none; }
        .search-clear.show { display: block; }
        .sort-bar { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 10px; }
        .sort-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--card-border); background: var(--btn-bg); color: var(--text); cursor: pointer; font-size: 0.8rem; }
        .sort-btn.active { background: white; color: #e91e63; border-color: #e91e63; }
        .categories-nav { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; }
        .cat-tab { padding: 10px 22px; border-radius: 50px; cursor: pointer; font-weight: 600; background: var(--btn-bg); color: var(--text); border: 2px solid transparent; }
        .cat-tab.active { background: white; color: #e91e63; border-color: #e91e63; }
        .cat-tab .count { background: #e91e63; color: white; padding: 2px 8px; border-radius: 20px; margin-left: 6px; font-size: 0.7rem; }
        .chart-container { display: none; background: var(--stat-bg); backdrop-filter: blur(15px); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--card-border); }
        .admin-mode .chart-container { display: block; }
        .chart-title { text-align: center; font-size: 1rem; margin-bottom: 15px; color: var(--text); }
        .chart-bars { display: flex; align-items: flex-end; gap: 8px; height: 150px; padding: 0 10px; }
        .chart-bar-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .chart-bar { width: 100%; background: linear-gradient(to top, #e91e63, #9c27b0); border-radius: 8px 8px 0 0; min-height: 4px; transition: height 0.5s ease; max-width: 40px; }
        .chart-bar-label { font-size: 0.65rem; color: var(--text); opacity: 0.7; }
        .chart-bar-value { font-size: 0.7rem; font-weight: bold; color: #e91e63; }
        .chart-empty { text-align: center; color: var(--text); opacity: 0.5; padding: 40px; }
        .stats-panel { display: none; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .admin-mode .stats-panel { display: flex; }
        .stat-card { background: var(--stat-bg); backdrop-filter: blur(15px); border-radius: 20px; padding: 18px 22px; text-align: center; min-width: 140px; flex: 1; border: 1px solid var(--card-border); }
        .stat-value { font-size: 1.8rem; font-weight: bold; background: var(--stat-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { font-size: 0.8rem; opacity: 0.7; }
        .top5-panel { display: none; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
        .admin-mode .top5-panel { display: flex; }
        .demand-panel { display: none; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
        .admin-mode .demand-panel { display: flex; }
        .admin-login-btn { padding: 14px 28px; border-radius: 50px; cursor: pointer; font-weight: bold; background: var(--btn-bg); color: var(--text); border: 1px solid var(--card-border); }
        .admin-section { display: none; padding: 20px; background: var(--card); border-radius: 20px; border: 1px solid var(--card-border); margin-bottom: 20px; text-align: center; }
        .admin-section.active { display: block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 9999; }
        .modal.active { display: flex !important; }
        .modal-content { background: var(--modal-bg); padding: 30px; border-radius: 25px; width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 2px solid var(--input-border); border-radius: 12px; background: var(--input-bg); color: var(--text); }
        .image-preview { width: 100%; height: 200px; border: 2px dashed var(--card-border); border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; background-size: cover; background-position: center; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-buttons .btn { padding: 14px 24px; border: none; border-radius: 12px; cursor: pointer; font-weight: 500; flex: 1; }
        .btn-primary { background: linear-gradient(135deg, #e91e63, #9c27b0); color: white; }
        .btn-secondary { background: #f8e8ff; color: #5c2d91; }
        .price-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 15px; }
        .price-card { background: var(--card); backdrop-filter: blur(20px); border-radius: 25px; overflow: hidden; border: 1px solid var(--card-border); animation: fadeIn 0.4s ease; }
        .price-card:hover { transform: translateY(-8px); }
        .card-image { width: 100%; height: 230px; object-fit: cover; }
        .card-content { padding: 18px; }
        .card-category { font-size: 0.7rem; color: #e91e63; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; font-weight: 600; }
        .card-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 8px; }
        .card-details { display: flex; gap: 6px; margin-bottom: 8px; }
        .card-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; color: white; }
        .card-badge.mg { background: #e91e63; }
        .card-badge.quantity { background: #7b1fa2; }
        .card-flavors { margin-bottom: 8px; font-size: 0.9rem; }
        .card-price { font-size: 1.6rem; font-weight: bold; background: var(--stat-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .card-sales-info { display: none; background: rgba(255,182,193,0.2); border-radius: 10px; padding: 6px 10px; margin-bottom: 8px; font-size: 0.8rem; }
        .admin-mode .card-sales-info { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 4px; }
        .card-sales-info.pending { background: rgba(255,152,0,0.2); animation: glow 1.5s infinite; }
        .buy-btn { display: block; width: 100%; padding: 10px; background: linear-gradient(135deg, #e91e63, #ad1457); color: white; border: none; border-radius: 15px; font-size: 0.95rem; font-weight: bold; cursor: pointer; }
        .add-to-cart-btn { display: block; width: 100%; padding: 8px; background: rgba(233,30,99,0.1); color: #e91e63; border: 1px solid rgba(233,30,99,0.3); border-radius: 12px; font-size: 0.85rem; cursor: pointer; margin-bottom: 6px; }
        .add-to-cart-btn.in-cart { background: #4CAF50; color: white; border-color: #4CAF50; }
        .confirm-btn, .cancel-btn { padding: 5px 10px; border-radius: 20px; cursor: pointer; font-size: 0.75rem; font-weight: bold; display: none; color: white; border: none; }
        .confirm-btn { background: #4CAF50; }
        .cancel-btn { background: #f44336; }
        .confirm-btn.show, .cancel-btn.show { display: inline-block; }
        .card-buttons { display: none; gap: 6px; margin-top: 6px; }
        .admin-mode .card-buttons { display: flex; }
        .admin-mode .buy-btn, .admin-mode .add-to-cart-btn { display: none; }
        .edit-btn, .delete-btn, .history-btn { padding: 8px; border-radius: 12px; cursor: pointer; font-size: 0.8rem; color: white; flex: 1; border: none; }
        .edit-btn { background: #ff9800; }
        .delete-btn { background: #f44336; }
        .history-btn { background: #2196F3; }
        .status-message { text-align: center; padding: 10px; border-radius: 10px; background: var(--stat-bg); color: var(--text); display: none; margin-top: 10px; }
        .status-message.show { display: block; }
        .cart-panel { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--card); backdrop-filter: blur(20px); border-radius: 20px; padding: 15px 25px; z-index: 100; box-shadow: 0 10px 40px rgba(233,30,99,0.3); display: none; align-items: center; gap: 15px; border: 1px solid var(--card-border); }
        .cart-panel.show { display: flex; }
        .cart-count { background: #e91e63; color: white; border-radius: 50%; width: 25px; height: 25px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
        .cart-btn { padding: 10px 20px; border-radius: 15px; border: none; cursor: pointer; font-weight: bold; }
        .cart-view-btn { background: #f8e8ff; color: #5c2d91; }
        .cart-order-btn { background: #e91e63; color: white; }
        .cart-modal, .upsell-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 3000; }
        .cart-modal.active, .upsell-overlay.active { display: flex; }
        .cart-modal-content { background: var(--modal-bg); padding: 25px; border-radius: 25px; width: 90%; max-width: 450px; max-height: 80vh; overflow-y: auto; }
        .cart-item { padding: 10px 0; border-bottom: 1px solid var(--card-border); display: flex; justify-content: space-between; align-items: center; }
        .cart-remove-btn { background: #f44336; color: white; border: none; padding: 5px 10px; border-radius: 10px; cursor: pointer; }
        .cart-total { text-align: right; font-size: 1.3rem; font-weight: bold; margin: 15px 0; }
        .cart-order-all-btn { width: 100%; padding: 14px; background: #0088cc; color: white; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .cart-meetup { margin-top: 10px; }
        .cart-meetup input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--card-border); background: var(--input-bg); color: var(--text); font-size: 0.9rem; margin-bottom: 8px; }
        .upsell-popup { background: var(--modal-bg); border-radius: 25px; padding: 25px; text-align: center; max-width: 350px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); animation: popIn 0.3s ease; }
        .upsell-popup h3 { margin-bottom: 8px; }
        .upsell-popup p { margin-bottom: 12px; font-size: 0.9rem; }
        .upsell-price { font-size: 1.3rem; font-weight: bold; color: #e91e63; }
        .upsell-old-price { text-decoration: line-through; opacity: 0.5; font-size: 0.9rem; margin-right: 8px; }
        .upsell-badge { display: inline-block; background: #4CAF50; color: white; padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; }
        .upsell-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .upsell-yes { flex: 2; padding: 12px; background: #4CAF50; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; }
        .upsell-no { flex: 1; padding: 12px; background: #f8e8ff; color: #5c2d91; border: none; border-radius: 15px; cursor: pointer; }
        .history-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 3000; }
        .history-modal.active { display: flex; }
        .history-content { background: var(--modal-bg); padding: 25px; border-radius: 25px; width: 90%; max-width: 450px; max-height: 80vh; overflow-y: auto; }
        .history-item { padding: 10px 0; border-bottom: 1px solid var(--card-border); display: flex; justify-content: space-between; align-items: center; }
        .loading-container { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; }
        .loading-spinner { width: 50px; height: 50px; border: 3px solid rgba(156,39,176,0.2); border-top: 3px solid #e91e63; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        .empty-category { text-align: center; padding: 40px; opacity: 0.6; grid-column: 1 / -1; }
        @media (max-width: 768px) { .price-grid { grid-template-columns: 1fr; } .stats-panel { flex-direction: column; } .cart-panel { flex-wrap: wrap; justify-content: center; width: 90%; } }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌸</button>
    <div class="container">
        <div class="header"><div class="logo" style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#e91e63,#9c27b0);display:inline-flex;align-items:center;justify-content:center;font-size:2.5rem;margin-bottom:10px;box-shadow:0 4px 15px rgba(233,30,99,0.2);">🌸</div><h1>Smoky Notes</h1><p>Доставка в удобное время и место 🚗</p></div>
        <div class="quick-actions" id="quickActions">
            <button class="quick-btn" onclick="openModal()">✨ Добавить</button>
            <button class="quick-btn success" onclick="loadData()">🔄 Обновить</button>
            <button class="quick-btn" onclick="showHistory()">📊 История</button>
            <button class="quick-btn" onclick="exportCSV()">📥 Экспорт</button>
            <button class="quick-btn danger" onclick="resetHistory()">🗑️ Сброс истории</button>
            <button class="quick-btn danger" onclick="if(confirm('Удалить ВСЕ товары?')){items=[];saveAllData();renderItems();buildCategories();}">⚠️ Сброс товаров</button>
        </div>
        <div class="search-container"><div class="search-wrapper"><input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск..."><button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button><span class="search-icon">🔍</span></div></div>
        <div class="sort-bar"><button class="sort-btn active" onclick="setSort('default')">📋 Обычно</button><button class="sort-btn" onclick="setSort('price-asc')">💰 Дешевле</button><button class="sort-btn" onclick="setSort('price-desc')">💎 Дороже</button><button class="sort-btn" onclick="setSort('popular')">🔥 Популярнее</button></div>
        <div class="categories-nav" id="categoriesNav"><div class="cat-tab active" data-cat="all">Все</div></div>
        <div class="chart-container" id="chartContainer"><div class="chart-title">📊 Продажи за 7 дней</div><div class="chart-bars" id="chartBars"></div></div>
        <div class="stats-panel" id="statsPanel">
            <div class="stat-card"><div class="stat-value" id="totalItems">0</div><div class="stat-label">📦 Товаров</div></div>
            <div class="stat-card"><div class="stat-value" id="totalValue">0₽</div><div class="stat-label">💰 Стоимость</div></div>
            <div class="stat-card"><div class="stat-value" id="totalSold">0</div><div class="stat-label">🛒 Продано</div></div>
            <div class="stat-card"><div class="stat-value" id="totalRevenue">0₽</div><div class="stat-label">💵 Прибыль</div></div>
            <div class="stat-card"><div class="stat-value" id="avgCheck">0₽</div><div class="stat-label">💰 Средний чек</div></div>
        </div>
        <div class="top5-panel" id="top5Panel"></div>
        <div class="demand-panel" id="demandPanel"></div>
        <div class="admin-controls"><button class="admin-login-btn" onclick="toggleAdmin()">🔑 Войти как админ</button></div>
        <div class="admin-section" id="adminSection"><div style="background:var(--card);border-radius:20px;padding:15px;margin-bottom:20px;text-align:center;"><input type="text" id="tgUsername" value="danil_cooldown" style="padding:10px 15px;border-radius:10px;border:1px solid var(--card-border);background:var(--input-bg);color:var(--text);font-size:1rem;width:250px;text-align:center;margin:10px 5px;"><button onclick="saveTgUsername()" style="padding:10px 20px;border-radius:10px;border:none;background:linear-gradient(135deg,#e91e63,#9c27b0);color:white;cursor:pointer;font-weight:bold;">💾 Сохранить</button></div></div>
        <div class="status-message" id="statusMessage"></div>
        <div class="price-grid" id="priceGrid"><div class="loading-container" style="grid-column:1/-1;"><div class="loading-spinner"></div><div>Загружаем...</div></div></div>
    </div>
    <div class="cart-panel" id="cartPanel"><span class="cart-count" id="cartCount">0</span><span class="cart-info" id="cartInfo">0 тов. · 0₽</span><button class="cart-btn cart-view-btn" onclick="openCart()">🛒</button><button class="cart-btn cart-order-btn" onclick="orderCart()">💬 Заказать</button></div>
    <div class="cart-modal" id="cartModal"><div class="cart-modal-content"><h3>🛒 Корзина</h3><div id="cartItems"></div><div class="cart-total" id="cartTotal">Итого: 0₽</div><div class="cart-meetup"><input type="text" id="meetupPlace" placeholder="📍 Где встретиться?"><input type="text" id="meetupTime" placeholder="🕐 Когда?"></div><button class="cart-order-all-btn" onclick="orderCart()">💬 Заказать с доставкой</button><button class="btn btn-secondary" onclick="closeCart()" style="margin-top:8px;width:100%;">Закрыть</button></div></div>
    <div class="upsell-overlay" id="upsellOverlay"><div class="upsell-popup"><span class="upsell-badge">-10%</span><h3>🛒 Добавить к заказу?</h3><p id="upsellName"></p><span class="upsell-old-price" id="upsellOldPrice"></span><span class="upsell-price" id="upsellNewPrice"></span><div class="upsell-buttons"><button class="upsell-no" onclick="closeUpsell()">Нет</button><button class="upsell-yes" onclick="acceptUpsell()">Да, добавить!</button></div></div></div>
    <div class="modal" id="modal"><div class="modal-content"><h2 id="modalTitle">Добавить товар</h2><input type="hidden" id="editId"><div class="form-group"><label>📛 Название</label><input type="text" id="itemName"></div><div class="form-group"><label>📂 Категория</label><select id="itemCategory"><option value="Жижи">💧 Жижи</option><option value="Одноразки">🚬 Одноразки</option><option value="Снюсы">👄 Снюсы</option><option value="Поды">💨 Поды</option></select></div><div class="form-group"><label>⚡ МГ</label><input type="text" id="itemMg"></div><div class="form-group"><label>🍓 Вкусы</label><textarea id="itemFlavors"></textarea></div><div class="form-group"><label>📦 Количество</label><input type="number" id="itemQuantity" min="0"></div><div class="form-group"><label>💰 Цена (₽)</label><input type="number" id="itemPrice"></div><div class="form-group"><label>📸 Фото</label><div class="image-preview" id="imagePreview"><span>Нажмите для загрузки</span></div><input type="file" id="imageInput" accept="image/*" style="display:none;"></div><div class="modal-buttons"><button class="btn btn-secondary" onclick="closeModal()">Отмена</button><button class="btn btn-primary" onclick="saveItem()">Сохранить</button></div></div></div>
    <div class="history-modal" id="historyModal"><div class="history-content"><h3>📋 История продаж</h3><div id="historyList"></div><button class="btn btn-secondary" onclick="closeHistory()" style="margin-top:10px;width:100%;">Закрыть</button></div></div>

<script>
const DEFAULT_TG = 'danil_cooldown';
let items = [], currentImage = null, isAdmin = false, currentCategory = 'all', searchQuery = '', sortMode = 'default';
let tgUsername = localStorage.getItem('tgUsername') || DEFAULT_TG;
let salesData = {}, salesHistory = [], pendingSales = {};
let cart = JSON.parse(localStorage.getItem('cart') || '[]');
let isDark = localStorage.getItem('darkTheme') === 'true';
let upsellItem = null;
const categories = ['Жижи', 'Одноразки', 'Снюсы', 'Поды'];
const catEmojis = { 'Жижи': '💧', 'Одноразки': '🚬', 'Снюсы': '👄', 'Поды': '💨' };

document.addEventListener('DOMContentLoaded', async function() {
    if (isDark) { document.body.classList.add('dark'); document.getElementById('themeToggle').textContent = '🌙'; }
    document.getElementById('tgUsername').value = tgUsername;
    var preview = document.getElementById('imagePreview');
    var input = document.getElementById('imageInput');
    preview.addEventListener('click', function() { input.click(); });
    preview.addEventListener('touchend', function(e) { e.preventDefault(); input.click(); });
    input.addEventListener('change', function(e) {
        var file = e.target.files[0];
        if (file) {
            var reader = new FileReader();
            reader.onload = function(ev) {
                var img = new Image();
                img.onload = function() {
                    var canvas = document.createElement('canvas');
                    var maxSize = 800;
                    var w = img.width, h = img.height;
                    if (w > h) { if (w > maxSize) { h *= maxSize / w; w = maxSize; } } else { if (h > maxSize) { w *= maxSize / h; h = maxSize; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    currentImage = canvas.toDataURL('image/jpeg', 0.8);
                    preview.style.backgroundImage = 'url(' + currentImage + ')';
                    preview.classList.add('has-image');
                    preview.innerHTML = '';
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }
    });
    document.getElementById('searchInput').addEventListener('input', function() { searchQuery = document.getElementById('searchInput').value.trim().toLowerCase(); document.getElementById('searchClear').classList.toggle('show', !!searchQuery); renderItems(); });
    await loadData(); buildCategories(); updateCartPanel();
    document.getElementById('categoriesNav').addEventListener('click', function(e) { if (e.target.classList.contains('cat-tab')) { document.querySelectorAll('.cat-tab').forEach(function(t) { t.classList.remove('active'); }); e.target.classList.add('active'); currentCategory = e.target.dataset.cat; renderItems(); } });
});

function toggleTheme() { isDark = !isDark; document.body.classList.toggle('dark', isDark); document.getElementById('themeToggle').textContent = isDark ? '🌙' : '🌸'; localStorage.setItem('darkTheme', isDark); }
function setSort(mode) { sortMode = mode; document.querySelectorAll('.sort-btn').forEach(function(b) { b.classList.remove('active'); }); event.target.classList.add('active'); renderItems(); }
function clearSearch() { document.getElementById('searchInput').value = ''; searchQuery = ''; document.getElementById('searchClear').classList.remove('show'); renderItems(); }
function exportCSV() { var csv = 'Название;Категория;МГ;Вкусы;Кол-во;Цена;Продано;Выручка\n'; items.forEach(function(i) { var s = salesData[i.id] || { count: 0, revenue: 0 }; csv += '"' + i.name + '";"' + (i.category||'') + '";"' + i.mg + '";"' + i.flavors + '";' + i.quantity + ';' + i.price + ';' + s.count + ';' + s.revenue + '\n'; }); var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' }); var link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = 'price_export.csv'; link.click(); showStatus('📥 Экспортировано!', 'success'); }
function buildCategories() { var nav = document.getElementById('categoriesNav'); var html = '<div class="cat-tab active" data-cat="all">Все</div>'; categories.forEach(function(cat) { var count = items.filter(function(i) { return i.category === cat; }).length; html += '<div class="cat-tab" data-cat="' + cat + '">' + catEmojis[cat] + ' ' + cat + '<span class="count">' + count + '</span></div>'; }); nav.innerHTML = html; }
function getFilteredItems() { var filtered = currentCategory === 'all' ? items.slice() : items.filter(function(i) { return i.category === currentCategory; }); if (searchQuery) filtered = filtered.filter(function(i) { return i.name.toLowerCase().indexOf(searchQuery) !== -1 || i.flavors.toLowerCase().indexOf(searchQuery) !== -1 || (i.category && i.category.toLowerCase().indexOf(searchQuery) !== -1); }); if (sortMode === 'price-asc') filtered.sort(function(a, b) { return parseInt(a.price) - parseInt(b.price); }); else if (sortMode === 'price-desc') filtered.sort(function(a, b) { return parseInt(b.price) - parseInt(a.price); }); else if (sortMode === 'popular') filtered.sort(function(a, b) { return (salesData[b.id] && salesData[b.id].count || 0) - (salesData[a.id] && salesData[a.id].count || 0); }); return filtered; }
function saveTgUsername() { var input = document.getElementById('tgUsername').value.trim().replace('@', ''); if (input) { tgUsername = input; localStorage.setItem('tgUsername', input); showStatus('✅ Сохранено!', 'success'); } }
function buyItem(item) { if (item.quantity <= 0) return; var message = encodeURIComponent('Здравствуйте! Хочу приобрести: ' + item.name + ', вкус: ' + item.flavors + ', ' + item.mg + ' за ' + item.price + '₽'); window.open('https://t.me/' + tgUsername + '?text=' + message, '_blank'); if (!pendingSales[item.id]) pendingSales[item.id] = 0; pendingSales[item.id]++; saveAllData(); renderItems(); showStatus('🔔 Новый заказ!', 'success'); }
function addToCart(item) { var existing = cart.find(function(c) { return c.id === item.id; }); if (existing) { existing.qty++; } else { cart.push({ id: item.id, name: item.name, price: parseInt(item.price), qty: 1, parentId: null }); } localStorage.setItem('cart', JSON.stringify(cart)); updateCartPanel(); showStatus('🛒 В корзине!', 'success'); var otherItems = items.filter(function(i) { return i.id !== item.id; }); if (otherItems.length > 0) { var randomItem = otherItems[Math.floor(Math.random() * otherItems.length)]; upsellItem = { name: randomItem.name, price: randomItem.price, parentId: item.id }; document.getElementById('upsellName').textContent = randomItem.name; document.getElementById('upsellOldPrice').textContent = randomItem.price + '₽'; document.getElementById('upsellNewPrice').textContent = Math.round(randomItem.price * 0.9) + '₽'; document.getElementById('upsellOverlay').classList.add('active'); } }
function acceptUpsell() { if (upsellItem) { cart.push({ id: 'd_' + Date.now(), name: upsellItem.name + ' (-10%)', price: Math.round(upsellItem.price * 0.9), qty: 1, parentId: upsellItem.parentId }); localStorage.setItem('cart', JSON.stringify(cart)); updateCartPanel(); showStatus('✅ Добавлено со скидкой 10%!', 'success'); } closeUpsell(); }
function closeUpsell() { document.getElementById('upsellOverlay').classList.remove('active'); upsellItem = null; }
function removeFromCart(id) { cart = cart.filter(function(c) { return c.id != id; }); localStorage.setItem('cart', JSON.stringify(cart)); updateCartPanel(); if (cart.length === 0) closeCart(); else openCart(); renderItems(); }
function updateCartPanel() { var panel = document.getElementById('cartPanel'), count = cart.reduce(function(s, c) { return s + c.qty; }, 0), total = cart.reduce(function(s, c) { return s + c.price * c.qty; }, 0); document.getElementById('cartCount').textContent = count; document.getElementById('cartInfo').textContent = count + ' тов. · ' + total + '₽'; panel.classList.toggle('show', count > 0); }
function openCart() { var modal = document.getElementById('cartModal'), itemsEl = document.getElementById('cartItems'); if (cart.length === 0) { itemsEl.innerHTML = '<p style="text-align:center;">Пусто</p>'; } else { itemsEl.innerHTML = cart.map(function(c) { return '<div class="cart-item"><span>' + c.name + ' x' + c.qty + '</span><span>' + (c.price*c.qty) + '₽</span><button class="cart-remove-btn" onclick="removeFromCart(\'' + c.id + '\')">✕</button></div>'; }).join(''); } document.getElementById('cartTotal').textContent = 'Итого: ' + cart.reduce(function(s,c) { return s + c.price*c.qty; }, 0) + '₽'; modal.classList.add('active'); }
function closeCart() { document.getElementById('cartModal').classList.remove('active'); }
function orderCart() { if (cart.length === 0) return; var place = document.getElementById('meetupPlace').value.trim(); var time = document.getElementById('meetupTime').value.trim(); var meetupInfo = (place || time) ? '\n\n📍 ' + (place || '—') + '\n🕐 ' + (time || '—') : ''; var itemsText = cart.map(function(c) { return '• ' + c.name + ' x' + c.qty + ' = ' + (c.price*c.qty) + '₽'; }).join('\n'); var total = cart.reduce(function(s,c) { return s + c.price*c.qty; }, 0); var message = encodeURIComponent('Здравствуйте! Хочу заказать:\n' + itemsText + '\n\nИтого: ' + total + '₽' + meetupInfo); window.open('https://t.me/' + tgUsername + '?text=' + message, '_blank'); cart.forEach(function(c) { if (!pendingSales[c.id]) pendingSales[c.id] = 0; pendingSales[c.id] += c.qty; }); saveAllData(); renderItems(); showStatus('🔔 Заказ из корзины!', 'success'); }
function confirmSale(itemId) { var item = items.find(function(i) { return i.id == itemId; }); if (!item || item.quantity <= 0) return; if (!pendingSales[itemId] || pendingSales[itemId] <= 0) return; item.quantity--; pendingSales[itemId]--; if (pendingSales[itemId] <= 0) pendingSales[itemId] = 0; if (!salesData[itemId]) salesData[itemId] = { count: 0, revenue: 0, name: item.name }; salesData[itemId].count++; salesData[itemId].revenue += parseInt(item.price); salesHistory.unshift({ date: new Date().toLocaleString('ru-RU'), name: item.name, price: parseInt(item.price), itemId: itemId }); if (salesHistory.length > 100) salesHistory = salesHistory.slice(0, 100); if (item.quantity <= 0) { setTimeout(function() { items = items.filter(function(i) { return i.id != itemId; }); saveAllData(); updateStats(); renderItems(); buildCategories(); }, 1500); } saveAllData(); updateStats(); renderItems(); buildCategories(); showStatus('✅ Продажа! +' + item.price + '₽', 'success'); }
function cancelSale(itemId) { if (!pendingSales[itemId]) return; pendingSales[itemId]--; if (pendingSales[itemId] <= 0) pendingSales[itemId] = 0; saveAllData(); renderItems(); }
function resetHistory() { if (confirm('Сбросить историю продаж и статистику? Товары останутся.')) { salesData = {}; salesHistory = []; pendingSales = {}; saveAllData(); updateStats(); renderItems(); showStatus('🗑️ История продаж сброшена', 'success'); } }
function updateStats() { var filtered = getFilteredItems(); document.getElementById('totalItems').textContent = filtered.length; document.getElementById('totalValue').textContent = filtered.reduce(function(s,i) { return s + (parseInt(i.price)*(i.quantity||0)); }, 0) + '₽'; var totalSold = Object.values(salesData).reduce(function(s,d) { return s + d.count; }, 0); var totalRevenue = Object.values(salesData).reduce(function(s,d) { return s + d.revenue; }, 0); document.getElementById('totalSold').textContent = totalSold; document.getElementById('totalRevenue').textContent = totalRevenue + '₽'; document.getElementById('avgCheck').textContent = (totalSold > 0 ? Math.round(totalRevenue / totalSold) : 0) + '₽'; if (isAdmin) { updateDemandAnalysis(); renderChart(); updateTop5(); } }
function renderChart() { var container = document.getElementById('chartBars'); var days = []; var today = new Date(); for (var i = 6; i >= 0; i--) { var d = new Date(today); d.setDate(d.getDate() - i); days.push({ label: d.toLocaleDateString('ru-RU', { weekday: 'short' }), date: d.toLocaleDateString('ru-RU'), total: 0 }); } salesHistory.forEach(function(s) { var sDate = s.date.split(',')[0]; var day = days.find(function(d) { return d.date === sDate; }); if (day) day.total += s.price; }); var maxTotal = Math.max.apply(null, days.map(function(d) { return d.total; })); if (maxTotal === 0 || days.every(function(d) { return d.total === 0; })) { container.innerHTML = '<div class="chart-empty">Нет продаж за 7 дней</div>'; return; } container.innerHTML = days.map(function(d) { var height = Math.max((d.total/maxTotal)*130, 4); return '<div class="chart-bar-wrapper"><div class="chart-bar-value">' + (d.total>0?d.total+'₽':'') + '</div><div class="chart-bar" style="height:' + height + 'px"></div><div class="chart-bar-label">' + d.label + '</div></div>'; }).join(''); }
function updateTop5() { var panel = document.getElementById('top5Panel'); var ranked = items.map(function(i) { return { name: i.name, sold: salesData[i.id] && salesData[i.id].count || 0, revenue: salesData[i.id] && salesData[i.id].revenue || 0 }; }).filter(function(i) { return i.sold > 0; }).sort(function(a, b) { return b.sold - a.sold; }).slice(0, 5); if (ranked.length === 0) { panel.innerHTML = ''; return; } var medals = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣']; panel.innerHTML = '<div class="stat-card" style="flex:1;min-width:250px;border:1px solid #FFD700;"><div class="stat-label" style="color:#FFD700;">🏆 Топ-5 товаров</div><div style="font-size:0.85rem;margin-top:8px;text-align:left;">' + ranked.map(function(i, idx) { return medals[idx] + ' ' + i.name + ' — ' + i.sold + ' шт. (' + i.revenue + '₽)'; }).join('<br>') + '</div></div>'; }
function updateDemandAnalysis() { var panel = document.getElementById('demandPanel'); if (items.length === 0) { panel.innerHTML = ''; return; } var withSales = items.map(function(i) { return { name: i.name, sold: salesData[i.id] && salesData[i.id].count || 0 }; }).filter(function(i) { return i.sold > 0; }); if (withSales.length === 0) { panel.innerHTML = '<div class="stat-card" style="flex:1;text-align:center;">📊 Пока нет продаж</div>'; return; } var sorted = withSales.sort(function(a, b) { return b.sold - a.sold; }); var topCount = Math.max(1, Math.ceil(sorted.length * 0.3)); var highDemand = sorted.slice(0, topCount); var lowDemand = sorted.slice(-topCount); var noSales = items.filter(function(i) { return (salesData[i.id] && salesData[i.id].count || 0) === 0; }); var html = ''; if (highDemand.length > 0) html += '<div class="stat-card" style="border:1px solid #4CAF50;flex:2;min-width:250px;"><div class="stat-label" style="color:#4CAF50;">🔥 Высокий спрос</div><div style="font-size:0.85rem;margin-top:8px;text-align:left;">' + highDemand.map(function(i) { return '• ' + i.name + ' — ' + i.sold + ' шт.'; }).join('<br>') + '</div></div>'; if (lowDemand.length > 0) html += '<div class="stat-card" style="border:1px solid #f44336;flex:2;min-width:250px;"><div class="stat-label" style="color:#f44336;">📉 Низкий спрос</div><div style="font-size:0.85rem;margin-top:8px;text-align:left;">' + lowDemand.map(function(i) { return '• ' + i.name + ' — ' + i.sold + ' шт.'; }).join('<br>') + '</div></div>'; if (noSales.length > 0) html += '<div class="stat-card" style="border:1px solid #FF9800;flex:1;min-width:200px;"><div class="stat-label" style="color:#FF9800;">🆕 Без продаж</div><div style="font-size:0.85rem;margin-top:8px;text-align:left;">' + noSales.slice(0,5).map(function(i) { return '• ' + i.name; }).join('<br>') + (noSales.length>5?'<br>...и ещё ' + (noSales.length-5):'') + '</div></div>'; panel.innerHTML = html; }
function showHistory() { var modal = document.getElementById('historyModal'), list = document.getElementById('historyList'); list.innerHTML = salesHistory.length === 0 ? '<p style="text-align:center;">Нет истории</p>' : salesHistory.slice(0,20).map(function(h) { return '<div class="history-item"><span>' + h.name + '</span><span>' + h.date + '</span><span>' + h.price + '₽</span></div>'; }).join(''); modal.classList.add('active'); }
function closeHistory() { document.getElementById('historyModal').classList.remove('active'); }
function loadData() { 
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'data.json', false);
    try {
        xhr.send();
        if (xhr.status === 200) {
            var d = JSON.parse(xhr.responseText);
            items = d.items || [];
            salesData = d.salesData || {};
            salesHistory = d.salesHistory || [];
            pendingSales = d.pendingSales || {};
            localStorage.setItem('priceData', xhr.responseText);
        }
    } catch(e) {
        var saved = localStorage.getItem('priceData');
        if (saved) {
            var d = JSON.parse(saved);
            items = d.items || [];
            salesData = d.salesData || {};
            salesHistory = d.salesHistory || [];
            pendingSales = d.pendingSales || {};
        }
    }
    updateStats(); renderItems(); buildCategories();
}
function saveAllData() { 
    var data = JSON.stringify({ items: items, salesData: salesData, salesHistory: salesHistory, pendingSales: pendingSales });
    localStorage.setItem('priceData', data);
    // Сохраняем на GitHub
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'https://api.github.com/repos/danilkoshmarov/price-list/contents/data.json', false);
    xhr.setRequestHeader('Authorization', 'token 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');
    try {
        xhr.send();
        if (xhr.status === 200) {
            var d = JSON.parse(xhr.responseText);
            var content = btoa(unescape(encodeURIComponent(data)));
            var putXhr = new XMLHttpRequest();
            putXhr.open('PUT', 'https://api.github.com/repos/danilkoshmarov/price-list/contents/data.json', false);
            putXhr.setRequestHeader('Authorization', 'token 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');
            putXhr.setRequestHeader('Content-Type', 'application/json');
            putXhr.send(JSON.stringify({ message: 'update', content: content, sha: d.sha }));
        }
    } catch(e) {}
}
function toggleAdmin() { isAdmin = !isAdmin; if (isAdmin) { if (prompt('Пароль:') === atob('MTUwNDIw')) { document.getElementById('adminSection').classList.add('active'); document.querySelector('.admin-login-btn').textContent = '🔒 Выйти'; document.body.classList.add('admin-mode'); updateStats(); } else { alert('Неверно!'); isAdmin = false; } } else { document.getElementById('adminSection').classList.remove('active'); document.querySelector('.admin-login-btn').textContent = '🔑 Войти как админ'; document.body.classList.remove('admin-mode'); } }
function showStatus(msg, type) { var el = document.getElementById('statusMessage'); if (!el) return; el.textContent = msg; el.className = 'status-message show'; el.style.background = type === 'success' ? 'rgba(76,175,80,0.3)' : 'rgba(244,67,54,0.3)'; setTimeout(function() { el.classList.remove('show'); }, 2000); }
function openModal(editItem) { document.getElementById('modal').classList.add('active'); if (editItem) { document.getElementById('modalTitle').textContent = 'Редактировать'; document.getElementById('editId').value = editItem.id; document.getElementById('itemName').value = editItem.name||''; document.getElementById('itemCategory').value = editItem.category||'Жижи'; document.getElementById('itemMg').value = editItem.mg||''; document.getElementById('itemFlavors').value = editItem.flavors||''; document.getElementById('itemQuantity').value = editItem.quantity||0; document.getElementById('itemPrice').value = editItem.price||''; currentImage = editItem.image||null; var p = document.getElementById('imagePreview'); if (currentImage) { p.style.backgroundImage = 'url('+currentImage+')'; p.classList.add('has-image'); p.innerHTML = ''; } else { p.style.backgroundImage = ''; p.classList.remove('has-image'); p.innerHTML = '<span>Нажмите для загрузки</span>'; } } else { document.getElementById('modalTitle').textContent = 'Добавить товар'; document.getElementById('editId').value = ''; ['itemName','itemMg','itemFlavors','itemQuantity','itemPrice'].forEach(function(id) { document.getElementById(id).value = ''; }); document.getElementById('itemCategory').value = 'Жижи'; currentImage = null; var p = document.getElementById('imagePreview'); p.style.backgroundImage = ''; p.classList.remove('has-image'); p.innerHTML = '<span>Нажмите для загрузки</span>'; } }
function closeModal() { document.getElementById('modal').classList.remove('active'); }
function saveItem() { var editId = document.getElementById('editId').value; var n = document.getElementById('itemName').value.trim(); var cat = document.getElementById('itemCategory').value; var m = document.getElementById('itemMg').value.trim(); var f = document.getElementById('itemFlavors').value.trim(); var q = parseInt(document.getElementById('itemQuantity').value)||0; var p = document.getElementById('itemPrice').value.trim(); if (!n||!m||!f||p===''||!currentImage) { alert('Заполните все поля!'); return; } var itemData = { id: editId?parseInt(editId):Date.now(), name: n, category: cat, mg: m, flavors: f, quantity: q, price: p, image: currentImage }; if (editId) { var idx = items.findIndex(function(i) { return i.id==editId; }); if (idx!==-1) items[idx] = itemData; } else { items.push(itemData); } saveAllData(); updateStats(); renderItems(); buildCategories(); closeModal(); }
function deleteItem(id) { if (confirm('Удалить?')) { items = items.filter(function(i) { return i.id!==id; }); saveAllData(); updateStats(); renderItems(); buildCategories(); } }
function editItem(id) { var item = items.find(function(i) { return i.id===id; }); if (item) openModal(item); }

function renderItems() {
    var grid = document.getElementById('priceGrid'), filtered = getFilteredItems();
    if (items.length === 0) { grid.innerHTML = '<div class="empty-category">🌸 Товары не добавлены</div>'; updateStats(); return; }
    if (filtered.length === 0) { grid.innerHTML = '<div class="empty-category">📂 Ничего не найдено</div>'; updateStats(); return; }
    grid.innerHTML = '';
    filtered.forEach(function(item) {
        var sold = salesData[item.id] || { count: 0, revenue: 0 }, pending = pendingSales[item.id] || 0, isZero = item.quantity <= 0, inCart = cart.find(function(c) { return c.id===item.id; });
        var card = document.createElement('div'); card.className = 'price-card';
        card.innerHTML = '<img src="'+item.image+'" class="card-image"><div class="card-content"><div class="card-category">'+(catEmojis[item.category]||'📦')+' '+(item.category||'')+'</div><h3 class="card-title">'+item.name+'</h3><div class="card-details"><span class="card-badge mg">⚡ '+item.mg+'</span><span class="card-badge quantity'+(isZero?' zero':'')+'">📦 '+item.quantity+' шт</span></div><div class="card-flavors">🍓 '+item.flavors+'</div><div class="card-price">'+item.price+' ₽</div><div class="card-sales-info'+(pending?' pending':'')+'"><span>📊 '+sold.count+'</span><span>💵 '+sold.revenue+'₽</span>'+(pending?'<span style="color:#ff9800;">🔔'+pending+'</span>':'')+'<button class="confirm-btn'+(pending?' show':'')+'" onclick="confirmSale('+item.id+')" '+(item.quantity<=0?'disabled':'')+'>✅</button><button class="cancel-btn'+(pending?' show':'')+'" onclick="cancelSale('+item.id+')">✕</button></div><button class="add-to-cart-btn'+(inCart?' in-cart':'')+'" onclick="addToCart('+JSON.stringify(item).replace(/"/g,'&quot;')+')">'+(inCart?'✅ В корзине':'🛒 В корзину')+'</button><button class="buy-btn'+(isZero?' sold-out':'')+'" onclick="buyItem('+JSON.stringify(item).replace(/"/g,'&quot;')+')" '+(isZero?'disabled':'')+'>'+(isZero?'Нет в наличии':'💬 Купить')+'</button><div class="card-buttons"><button class="edit-btn" onclick="editItem('+item.id+')">✏️</button><button class="history-btn" onclick="showHistory()">📊</button><button class="delete-btn" onclick="deleteItem('+item.id+')">🗑️</button></div></div>';
        grid.appendChild(card);
    });
    updateStats();
}
</script>
