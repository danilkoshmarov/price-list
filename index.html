<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прайс-лист | ТГК</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 40px; }
        .header h1 { font-size: 3rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header p { font-size: 1.2rem; opacity: 0.9; }
        .admin-controls { text-align: center; margin-bottom: 20px; }
        .add-item-btn, .admin-login-btn, .sync-btn {
            background: white; color: #667eea; border: none; padding: 15px 30px;
            font-size: 1.1rem; border-radius: 50px; cursor: pointer; margin: 5px;
            transition: all 0.3s ease; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .sync-btn { background: #4CAF50; color: white; }
        .admin-section { display: none; text-align: center; margin-bottom: 30px; padding: 20px; background: rgba(255,255,255,0.1); border-radius: 15px; }
        .admin-section.active { display: block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #555; font-weight: 500; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1rem; font-family: inherit; }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .image-preview { width: 100%; height: 200px; border: 2px dashed #e0e0e0; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; background-size: cover; background-position: center; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; font-weight: 500; flex: 1; transition: all 0.3s ease; }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .price-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 20px; }
        .price-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: all 0.3s ease; }
        .price-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .card-image { width: 100%; height: 250px; object-fit: cover; }
        .card-content { padding: 20px; }
        .card-title { font-size: 1.5rem; font-weight: bold; color: #333; margin-bottom: 10px; }
        .card-details { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .card-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; color: white; }
        .card-badge.mg { background: #ff6b6b; }
        .card-badge.quantity { background: #4ecdc4; }
        .card-flavors { color: #666; margin-bottom: 10px; font-size: 0.95rem; }
        .card-price { font-size: 1.8rem; font-weight: bold; color: #667eea; margin-bottom: 15px; }
        .buy-btn {
            display: block; width: 100%; padding: 12px; background: linear-gradient(135deg, #0088cc, #00a8e8);
            color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; transition: all 0.3s ease; text-align: center;
        }
        .buy-btn:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(0,136,204,0.4); }
        .card-buttons { display: none; gap: 8px; margin-top: 8px; }
        .admin-mode .card-buttons { display: flex; }
        .admin-mode .buy-btn { display: none; }
        .edit-btn, .delete-btn { 
            border: none; padding: 10px; border-radius: 10px; cursor: pointer; 
            font-size: 0.9rem; transition: all 0.3s ease; color: white; flex: 1; 
        }
        .edit-btn { background: #ffa502; }
        .delete-btn { background: #ff6b6b; }
        .status-message { text-align: center; color: white; margin-top: 10px; padding: 10px; border-radius: 10px; background: rgba(255,255,255,0.2); display: none; }
        .status-message.show { display: block; }
        .tg-setup {
            background: rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 20px;
            color: white; text-align: center; backdrop-filter: blur(10px);
        }
        .tg-setup input {
            padding: 10px 15px; border-radius: 10px; border: none; font-size: 1rem;
            width: 250px; text-align: center; margin: 10px 5px;
        }
        .tg-setup button {
            padding: 10px 20px; border-radius: 10px; border: none; background: #0088cc;
            color: white; font-size: 1rem; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>🚀 Наш Прайс-лист</h1><p>Нажми на "Купить" чтобы оформить заказ</p></div>
        <div class="admin-controls"><button class="admin-login-btn" onclick="toggleAdmin()">🔑 Войти как админ</button></div>
        <div class="admin-section" id="adminSection">
            <div class="tg-setup">
                <label>🔗 Ваш Telegram username:</label><br>
                <input type="text" id="tgUsername" placeholder="danil_cooldown" value="danil_cooldown">
                <button onclick="saveTgUsername()">💾 Сохранить</button>
            </div>
            <button class="add-item-btn" onclick="openModal()">✨ Добавить товар</button>
            <button class="sync-btn" onclick="loadData()">🔄 Обновить из облака</button>
            <div class="status-message" id="statusMessage"></div>
        </div>
        <div class="price-grid" id="priceGrid"></div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Добавить товар</h2>
            <input type="hidden" id="editId">
            <div class="form-group"><label>📛 Название</label><input type="text" id="itemName" placeholder="Название товара"></div>
            <div class="form-group"><label>⚡ МГ</label><input type="text" id="itemMg" placeholder="20мг, 50мг"></div>
            <div class="form-group"><label>🍓 Вкусы</label><textarea id="itemFlavors" placeholder="Арбуз, Клубника"></textarea></div>
            <div class="form-group"><label>📦 Количество</label><input type="text" id="itemQuantity" placeholder="1шт, 2шт"></div>
            <div class="form-group"><label>💰 Цена (₽)</label><input type="number" id="itemPrice" placeholder="Цена"></div>
            <div class="form-group"><label>📸 Фото</label><div class="image-preview" id="imagePreview"><span>Нажмите для загрузки</span></div><input type="file" id="imageInput" accept="image/*" style="display:none;"></div>
            <div class="modal-buttons"><button class="btn btn-secondary" onclick="closeModal()">Отмена</button><button class="btn btn-primary" onclick="saveItem()">Сохранить</button></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://api.npoint.io/5a29c0f8eaf291939ddf';
        const DEFAULT_TG = 'danil_cooldown';
        let items = [];
        let currentImage = null;
        let isAdmin = false;
        let tgUsername = localStorage.getItem('tgUsername') || DEFAULT_TG;

        document.addEventListener('DOMContentLoaded', async () => {
            await loadData();
            document.getElementById('tgUsername').value = tgUsername;
            
            document.getElementById('imagePreview').addEventListener('click', () => document.getElementById('imageInput').click());
            document.getElementById('imageInput').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        currentImage = ev.target.result;
                        const p = document.getElementById('imagePreview');
                        p.style.backgroundImage = `url(${currentImage})`;
                        p.classList.add('has-image');
                        p.innerHTML = '';
                    };
                    reader.readAsDataURL(file);
                }
            });
        });

        function saveTgUsername() {
            const input = document.getElementById('tgUsername').value.trim().replace('@', '');
            if (input) {
                tgUsername = input;
                localStorage.setItem('tgUsername', input);
                showStatus('✅ Telegram сохранён!', 'success');
            }
        }

        function buyItem(item) {
            const message = encodeURIComponent(`Здравствуйте! Хочу приобрести: ${item.name}, вкус: ${item.flavors}, ${item.mg}, ${item.quantity} за ${item.price}₽`);
            window.open(`https://t.me/${tgUsername}?text=${message}`, '_blank');
        }

        async function loadData() {
            try {
                const r = await fetch(API_URL);
                if (r.ok) { const d = await r.json(); items = d.items || []; }
            } catch (e) {}
            renderItems();
        }

        async function saveData() {
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items: items })
                });
                showStatus('✅ Сохранено!', 'success');
            } catch (e) { showStatus('❌ Ошибка', 'error'); }
        }

        function toggleAdmin() {
            isAdmin = !isAdmin;
            if (isAdmin) {
                if (prompt('Пароль:') === 'admin123') {
                    document.getElementById('adminSection').classList.add('active');
                    document.querySelector('.admin-login-btn').textContent = '🔒 Выйти';
                    document.body.classList.add('admin-mode');
                } else { alert('Неверно!'); isAdmin = false; }
            } else {
                document.getElementById('adminSection').classList.remove('active');
                document.querySelector('.admin-login-btn').textContent = '🔑 Войти как админ';
                document.body.classList.remove('admin-mode');
            }
        }

        function showStatus(msg, type) {
            const el = document.getElementById('statusMessage');
            el.textContent = msg; el.className = 'status-message show';
            el.style.background = type === 'success' ? 'rgba(76,175,80,0.3)' : 'rgba(244,67,54,0.3)';
            setTimeout(() => el.classList.remove('show'), 2000);
        }

        function openModal(editItem = null) {
            document.getElementById('modal').classList.add('active');
            
            if (editItem) {
                document.getElementById('modalTitle').textContent = 'Редактировать товар';
                document.getElementById('editId').value = editItem.id;
                document.getElementById('itemName').value = editItem.name;
                document.getElementById('itemMg').value = editItem.mg;
                document.getElementById('itemFlavors').value = editItem.flavors;
                document.getElementById('itemQuantity').value = editItem.quantity;
                document.getElementById('itemPrice').value = editItem.price;
                currentImage = editItem.image;
                const p = document.getElementById('imagePreview');
                p.style.backgroundImage = `url(${currentImage})`;
                p.classList.add('has-image');
                p.innerHTML = '';
            } else {
                document.getElementById('modalTitle').textContent = 'Добавить товар';
                document.getElementById('editId').value = '';
                ['itemName','itemMg','itemFlavors','itemQuantity','itemPrice'].forEach(id => document.getElementById(id).value = '');
                currentImage = null;
                const p = document.getElementById('imagePreview');
                p.style.backgroundImage = ''; p.classList.remove('has-image'); p.innerHTML = '<span>Нажмите для загрузки</span>';
            }
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        async function saveItem() {
            const editId = document.getElementById('editId').value;
            const n = document.getElementById('itemName').value.trim();
            const m = document.getElementById('itemMg').value.trim();
            const f = document.getElementById('itemFlavors').value.trim();
            const q = document.getElementById('itemQuantity').value.trim();
            const p = document.getElementById('itemPrice').value.trim();

            if (!n || !m || !f || !q || !p || !currentImage) { alert('Заполните все поля!'); return; }

            if (editId) {
                const index = items.findIndex(i => i.id == editId);
                if (index !== -1) {
                    items[index] = { ...items[index], name: n, mg: m, flavors: f, quantity: q, price: p, image: currentImage };
                }
            } else {
                items.push({ id: Date.now(), name: n, mg: m, flavors: f, quantity: q, price: p, image: currentImage });
            }

            await saveData();
            renderItems();
            closeModal();
        }

        async function deleteItem(id) {
            if (confirm('Удалить товар?')) { items = items.filter(i => i.id !== id); await saveData(); renderItems(); }
        }

        function editItem(id) {
            const item = items.find(i => i.id === id);
            if (item) openModal(item);
        }

        function renderItems() {
            const grid = document.getElementById('priceGrid');
            grid.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'price-card';
                card.innerHTML = `
                    <img src="${item.image}" class="card-image" alt="${item.name}">
                    <div class="card-content">
                        <h3 class="card-title">${item.name}</h3>
                        <div class="card-details">
                            <span class="card-badge mg">⚡ ${item.mg}</span>
                            <span class="card-badge quantity">📦 ${item.quantity}</span>
                        </div>
                        <div class="card-flavors">🍓 ${item.flavors}</div>
                        <div class="card-price">${item.price} ₽</div>
                        <button class="buy-btn" onclick="buyItem(${JSON.stringify(item).replace(/"/g, '&quot;')})">💬 Купить</button>
                        <div class="card-buttons">
                            <button class="edit-btn" onclick="editItem(${item.id})">✏️ Изменить</button>
                            <button class="delete-btn" onclick="deleteItem(${item.id})">🗑️ Удалить</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
