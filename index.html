<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прайс-лист | ТГК</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 40px; }
        .header h1 { font-size: 3rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header p { font-size: 1.2rem; opacity: 0.9; }
        .admin-controls { text-align: center; margin-bottom: 20px; }
        .add-item-btn, .admin-login-btn, .sync-btn {
            background: white; color: #667eea; border: none; padding: 15px 30px;
            font-size: 1.1rem; border-radius: 50px; cursor: pointer; margin: 5px;
            transition: all 0.3s ease; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .add-item-btn:hover, .admin-login-btn:hover, .sync-btn:hover {
            transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .sync-btn { background: #4CAF50; color: white; }
        .admin-section { display: none; text-align: center; margin-bottom: 30px; padding: 20px; background: rgba(255,255,255,0.1); border-radius: 15px; }
        .admin-section.active { display: block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto; }
        .modal-content h2 { margin-bottom: 20px; color: #333; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #555; font-weight: 500; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1rem; }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .image-preview { width: 100%; height: 200px; border: 2px dashed #e0e0e0; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; background-size: cover; background-position: center; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn { padding: 12px 24px; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; font-weight: 500; flex: 1; }
        .btn-primary { background: #667eea; color: white; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .price-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; margin-top: 20px; }
        .price-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: transform 0.3s ease; }
        .price-card:hover { transform: translateY(-10px); }
        .card-image { width: 100%; height: 250px; object-fit: cover; }
        .card-content { padding: 20px; }
        .card-title { font-size: 1.5rem; font-weight: bold; color: #333; margin-bottom: 10px; }
        .card-details { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .card-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; color: white; }
        .card-badge.mg { background: #ff6b6b; }
        .card-badge.quantity { background: #4ecdc4; }
        .card-flavors { color: #666; margin-bottom: 10px; }
        .card-price { font-size: 1.8rem; font-weight: bold; color: #667eea; }
        .delete-btn { background: #ff6b6b; color: white; border: none; padding: 8px 16px; border-radius: 10px; cursor: pointer; margin-top: 10px; width: 100%; display: none; }
        .admin-mode .delete-btn { display: block; }
        .status-message { text-align: center; color: white; margin-top: 10px; padding: 10px; border-radius: 10px; background: rgba(255,255,255,0.2); display: none; }
        .status-message.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Наш Прайс-лист</h1>
            <p>Лучшие товары по доступным ценам</p>
        </div>
        <div class="admin-controls">
            <button class="admin-login-btn" onclick="toggleAdmin()">🔑 Войти как админ</button>
        </div>
        <div class="admin-section" id="adminSection">
            <button class="add-item-btn" onclick="openModal()">✨ Добавить товар</button>
            <button class="sync-btn" onclick="loadData()">🔄 Обновить из облака</button>
            <div class="status-message" id="statusMessage"></div>
        </div>
        <div class="price-grid" id="priceGrid"></div>
    </div>
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2>Добавить новый товар</h2>
            <div class="form-group"><label>📛 Название</label><input type="text" id="itemName" placeholder="Например: MARS Pod"></div>
            <div class="form-group"><label>⚡ МГ</label><input type="text" id="itemMg" placeholder="20мг, 50мг"></div>
            <div class="form-group"><label>🍓 Вкусы</label><textarea id="itemFlavors" placeholder="Арбуз, Клубника, Манго"></textarea></div>
            <div class="form-group"><label>📦 Количество</label><input type="text" id="itemQuantity" placeholder="1шт, 2шт"></div>
            <div class="form-group"><label>💰 Цена (₽)</label><input type="number" id="itemPrice" placeholder="Цена"></div>
            <div class="form-group"><label>📸 Изображение</label><div class="image-preview" id="imagePreview"><span>Нажмите для загрузки фото</span></div><input type="file" id="imageInput" accept="image/*" style="display: none;"></div>
            <div class="modal-buttons"><button class="btn btn-secondary" onclick="closeModal()">Отмена</button><button class="btn btn-primary" onclick="addItem()">Добавить</button></div>
        </div>
    </div>
    <script>
        const JSONBIN_API_KEY = '$2a$10$e9b2f1B7CDdjU0uCpb9Wi.H8OyGeMXyX8HQRIdgK5QMnBauM8pZmu';
        const JSONBIN_BIN_ID = '6a4a5f7eda38895dfe30e687';
        let items = [];
        let currentImage = null;
        let isAdmin = false;

        document.addEventListener('DOMContentLoaded', async () => {
            await loadData();
            document.getElementById('imagePreview').addEventListener('click', () => document.getElementById('imageInput').click());
            document.getElementById('imageInput').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => { currentImage = ev.target.result; const p = document.getElementById('imagePreview'); p.style.backgroundImage = `url(${currentImage})`; p.classList.add('has-image'); p.innerHTML = ''; };
                    reader.readAsDataURL(file);
                }
            });
        });

        async function loadData() {
            try {
                const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, { headers: { 'X-Master-Key': JSONBIN_API_KEY } });
                if (r.ok) { const d = await r.json(); items = d.record.items || []; }
            } catch (e) { showStatus('Нет связи с облаком', 'error'); }
            renderItems();
        }

        async function saveData() {
            try {
                await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
                    body: JSON.stringify({ items: items })
                });
                showStatus('✅ Автосохранение!', 'success');
            } catch (e) { showStatus('❌ Ошибка сохранения', 'error'); }
        }

        function toggleAdmin() {
            isAdmin = !isAdmin;
            if (isAdmin) {
                const p = prompt('Пароль:');
                if (p === 'admin123') {
                    document.getElementById('adminSection').classList.add('active');
                    document.querySelector('.admin-login-btn').textContent = '🔒 Выйти';
                    document.body.classList.add('admin-mode');
                } else { alert('Неверно!'); isAdmin = false; }
            } else {
                document.getElementById('adminSection').classList.remove('active');
                document.querySelector('.admin-login-btn').textContent = '🔑 Войти как админ';
                document.body.classList.remove('admin-mode');
            }
        }

        function showStatus(msg, type) {
            const el = document.getElementById('statusMessage');
            el.textContent = msg; el.className = 'status-message show';
            el.style.background = type === 'success' ? 'rgba(76,175,80,0.3)' : 'rgba(244,67,54,0.3)';
            setTimeout(() => el.classList.remove('show'), 2000);
        }

        function openModal() {
            document.getElementById('modal').classList.add('active');
            ['itemName','itemMg','itemFlavors','itemQuantity','itemPrice'].forEach(id => document.getElementById(id).value = '');
            currentImage = null;
            const p = document.getElementById('imagePreview'); p.style.backgroundImage = ''; p.classList.remove('has-image'); p.innerHTML = '<span>Нажмите для загрузки фото</span>';
        }

        function closeModal() { document.getElementById('modal').classList.remove('active'); }

        async function addItem() {
            const name = document.getElementById('itemName').value.trim();
            const mg = document.getElementById('itemMg').value.trim();
            const flavors = document.getElementById('itemFlavors').value.trim();
            const quantity = document.getElementById('itemQuantity').value.trim();
            const price = document.getElementById('itemPrice').value.trim();
            if (!name || !mg || !flavors || !quantity || !price || !currentImage) { alert('Заполните все поля!'); return; }
            items.push({ id: Date.now(), name, mg, flavors, quantity, price, image: currentImage });
            await saveData();
            renderItems();
            closeModal();
        }

        async function deleteItem(id) {
            if (confirm('Удалить?')) { items = items.filter(i => i.id !== id); await saveData(); renderItems(); }
        }

        function renderItems() {
            const grid = document.getElementById('priceGrid');
            grid.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'price-card';
                card.innerHTML = `<img src="${item.image}" class="card-image"><div class="card-content"><h3 class="card-title">${item.name}</h3><div class="card-details"><span class="card-badge mg">⚡ ${item.mg}</span><span class="card-badge quantity">📦 ${item.quantity}</span></div><div class="card-flavors">🍓 ${item.flavors}</div><div class="card-price">${item.price} ₽</div><button class="delete-btn" onclick="deleteItem(${item.id})">🗑️ Удалить</button></div>`;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
